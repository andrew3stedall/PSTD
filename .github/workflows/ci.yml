name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo build
      - name: Run cargo tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --all 2>&1 | tee cargo-test.log
      - name: Upload cargo test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-test-log
          path: cargo-test.log
      - name: Run clippy
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --all-targets --all-features -- -D warnings 2>&1 | tee clippy.log
      - name: Upload clippy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-log
          path: clippy.log
      - name: Check rustfmt
        shell: bash
        run: |
          set -o pipefail
          cargo fmt --check 2>&1 | tee fmt.log
      - name: Upload rustfmt log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fmt-log
          path: fmt.log

  cli:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build
      - run: cargo run -- --help
      - run: cargo run -- batch --help
      - run: cargo run -- inspect --help
      - name: Find fixture
        id: fixture
        run: |
          fixture=$(find . -type f -iname '*.pst' | head -n 1 || true)
          echo "fixture=$fixture" >> "$GITHUB_OUTPUT"
      - name: Inspect fixture
        if: steps.fixture.outputs.fixture != ''
        run: cargo run -- inspect --input "${{ steps.fixture.outputs.fixture }}"
      - name: Extract fixture metadata
        if: steps.fixture.outputs.fixture != ''
        run: cargo run -- extract --input "${{ steps.fixture.outputs.fixture }}" --output /tmp/pstd-ci-output --manifest-only

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build
      - run: echo "$PWD/target/debug" >> "$GITHUB_PATH"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ./python
      - run: python -m pstd --help

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t pstd:local -f docker/Dockerfile .
