name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo build
      - name: Run cargo tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --all 2>&1 | tee cargo-test.log
      - name: Upload cargo test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-test-log
          path: cargo-test.log
      - name: Run clippy
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --all-targets --all-features -- -D warnings -A clippy::too_many_arguments 2>&1 | tee clippy.log
      - name: Upload clippy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-log
          path: clippy.log
      - name: Check rustfmt
        shell: bash
        run: |
          set -o pipefail
          cargo fmt --check 2>&1 | tee fmt.log
      - name: Upload rustfmt log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fmt-log
          path: fmt.log

  cli:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build
      - run: cargo run -- --help
      - run: cargo run -- batch --help
      - run: cargo run -- inspect --help
      - name: Find fixture
        id: fixture
        run: |
          fixture=$(find . -type f -iname '*.pst' | sort | head -n 1 || true)
          echo "fixture=$fixture" >> "$GITHUB_OUTPUT"
      - name: Public PST progress fixture
        if: steps.fixture.outputs.fixture != ''
        shell: bash
        run: |
          set -euo pipefail
          fixture="${{ steps.fixture.outputs.fixture }}"
          progress_dir="/tmp/pstd-public-pst-progress"
          output_dir="/tmp/pstd-public-pst-output"
          mkdir -p "$progress_dir"
          echo "$fixture" > "$progress_dir/fixture_path.txt"
          stat -c '%s' "$fixture" > "$progress_dir/fixture_size_bytes.txt"
          cargo run -- inspect --input "$fixture" --json > "$progress_dir/inspect.json"
          cargo run -- extract --input "$fixture" --output "$output_dir" --manifest-only --overwrite
          cp "$output_dir/run_summary.json" "$progress_dir/run_summary.json"
          find "$output_dir" -maxdepth 4 -type f | sort > "$progress_dir/output_files.txt"
          python scripts/public_pst_progress.py --progress-dir "$progress_dir"
          python scripts/pq32_descriptor_layout.py --progress-dir "$progress_dir"
          python scripts/pq33_payload_prefix.py --progress-dir "$progress_dir"
      - name: Upload public PST progress artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-pst-progress
          path: /tmp/pstd-public-pst-progress
          if-no-files-found: ignore

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build
      - run: echo "$PWD/target/debug" >> "$GITHUB_PATH"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ./python
      - run: python -m pstd --help

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t pstd:local -f docker/Dockerfile .
