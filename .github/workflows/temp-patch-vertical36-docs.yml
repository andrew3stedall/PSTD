name: Patch Vertical 36 documentation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    if: >-
      github.repository == 'andrew3stedall/PSTD' &&
      github.head_ref == 'agent/vertical-36-method5-eml-payload' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply exact documentation patch
        run: python tools/patch_vertical36_docs.py
      - name: Validate documentation
        run: |
          git diff --check
          grep -Fq 'Vertical 36 / PR #461' README.md
          grep -Fq '2 / 12,315' docs/product/project-status.md
          grep -Fq 'Lock complete Tika folder and message coverage' docs/product/pstd-v1-roadmap.md
          grep -Fq 'Exact: 453-byte `message/rfc822`' docs/product/compatibility-matrix.md
          grep -Fq 'Vertical 36 / #461' docs/operations/public-pst-progress-log.md
          grep -Fq 'vertical-36-materialise-method5-eml-payload.md' docs/README.md
          if grep -Fq 'attachment payload is still metadata-only' docs/product/compatibility-matrix.md; then
            echo 'stale metadata-only capability remains' >&2
            exit 1
          fi
      - name: Commit authoritative documentation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md docs
          git diff --cached --check
          git commit -m "Reconcile documentation through Vertical 36"
          git push origin HEAD:${{ github.head_ref }}
