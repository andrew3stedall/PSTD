name: PQ56 PR implementation trigger
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  implement:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/pq56-count-row-bitmap-bits
      - name: Execute implementation block
        shell: python
        run: |
          from pathlib import Path

          lines = Path('.github/workflows/pq56-implement.yml').read_text().splitlines()
          start = lines.index('        run: |', lines.index('      - name: Apply bounded bitmap-count implementation')) + 1
          end = lines.index('      - name: Format and test')
          source = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines[start:end])
          exec(compile(source, 'pq56-implementation', 'exec'))
      - name: Format and test
        run: |
          cargo fmt
          cargo test tc_subnode_rows
          cargo test tc_reporting
      - name: Commit permanent implementation
        run: |
          rm .github/workflows/pq56-implement.yml .github/workflows/pq56-pr-trigger.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/pst/tc_subnode_rows.rs src/pst/tc_reporting.rs docs/operations/pq56-row-bitmap-counts.md .github/workflows/pq56-implement.yml .github/workflows/pq56-pr-trigger.yml
          git commit -m "PQ56: count bounded row bitmap bits"
          git push origin HEAD:feature/pq56-count-row-bitmap-bits
