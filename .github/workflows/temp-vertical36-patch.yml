name: Temporary Vertical 36 patch

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    if: >-
      github.repository == 'andrew3stedall/PSTD' &&
      github.head_ref == 'agent/vertical-36-method5-eml-payload' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Correct generated ownership sets
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tools/temp_vertical36_patch.py")
          text = path.read_text()
          replacements = [
              (
                  ".map(|attachment| attachment.attachment_key.as_str()),",
                  ".map(|attachment| attachment.attachment_key.clone()),",
              ),
              (
                  ".then_some(attachment.embedded_message_key.as_deref())",
                  ".then_some(attachment.embedded_message_key.clone())",
              ),
              (
                  ".map(|attachment| attachment.message_key.as_str())",
                  ".map(|attachment| attachment.message_key.clone())",
              ),
              (
                  "fn duplicate_values<'a>(values: impl Iterator<Item = &'a str>) -> BTreeSet<&'a str>",
                  "fn duplicate_values(values: impl Iterator<Item = String>) -> BTreeSet<String>",
              ),
          ]
          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"expected one generated-source replacement, found {count}: {old}")
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
      - name: Apply exact patch
        run: python tools/temp_vertical36_patch.py
      - name: Format and verify
        run: |
          cargo fmt --all
          cargo fmt --check
      - name: Focused build and tests
        shell: bash
        run: |
          set +e
          cargo test --all 2>&1 | tee vertical36-test.log
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vertical36-test-evidence
          path: vertical36-test.log
          if-no-files-found: error
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings -A clippy::too_many_arguments
      - name: Commit production changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/eml.rs src/lib.rs src/engine/metadata.rs src/bin/pstd-eml.rs
          git diff --cached --check
          git commit -m "Materialise method-5 child EML payload"
          git push origin HEAD:${{ github.head_ref }}
