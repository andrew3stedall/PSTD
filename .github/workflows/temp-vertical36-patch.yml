name: Temporary Vertical 36 patch

on:
  push:
    branches:
      - agent/vertical-36-method5-eml-payload
    paths:
      - tools/temp_vertical36_patch.py
      - .github/workflows/temp-vertical36-patch.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.repository == 'andrew3stedall/PSTD'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/vertical-36-method5-eml-payload
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply exact patch
        run: python tools/temp_vertical36_patch.py
      - name: Format
        run: cargo fmt --all
      - name: Focused build and tests
        run: cargo test --all
      - name: Commit production changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/eml.rs src/lib.rs src/engine/metadata.rs src/bin/pstd-eml.rs
          git diff --cached --check
          git commit -m "Materialise method-5 child EML payload"
          git push origin HEAD:agent/vertical-36-method5-eml-payload
