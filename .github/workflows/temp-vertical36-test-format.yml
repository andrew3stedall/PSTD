name: Temporary Vertical 36 test formatting

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  format-test:
    if: >-
      github.repository == 'andrew3stedall/PSTD' &&
      github.head_ref == 'agent/vertical-36-method5-eml-payload' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format and verify
        run: |
          cargo fmt --all
          cargo fmt --check
      - name: Validate tests
        run: |
          cargo test --all
          cargo clippy --all-targets --all-features -- -D warnings -A clippy::too_many_arguments
      - name: Commit formatted integration test
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tests/vertical36_embedded_eml.rs
          git diff --cached --check
          git commit -m "Format Vertical 36 integration tests"
          git push origin HEAD:${{ github.head_ref }}
