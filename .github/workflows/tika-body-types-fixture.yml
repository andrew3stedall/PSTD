name: Tika body-types fixture

on:
  pull_request:
  push:
    branches: [main]

jobs:
  body-form-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo test --all
      - run: cargo clippy --all-targets --all-features -- -D warnings -A clippy::too_many_arguments
      - run: cargo fmt --check
      - name: Extract independent body-form evidence
        shell: bash
        run: |
          set -euo pipefail
          fixture="tests/fixtures/upstream/tika-various-body-types.pst"
          evidence="/tmp/pstd-tika-body-types"
          output="/tmp/pstd-tika-body-types-output"
          mkdir -p "$evidence" "$output"

          (cd tests/fixtures/upstream && sha256sum --check SHA256SUMS)

          set +e
          cargo run -- extract --input "$fixture" --output "$output" --overwrite \
            > "$evidence/extract.stdout" 2> "$evidence/extract.stderr"
          extract_status=$?
          set -e
          printf '%s\n' "$extract_status" > "$evidence/extract-exit-code.txt"
          if [[ "$extract_status" -ne 0 && "$extract_status" -ne 2 ]]; then
            echo "Unexpected extraction exit code: $extract_status" >&2
            exit 1
          fi

          tar_file=$(find "$output/archives" -type f -name '*.tar' | sort | head -n 1)
          mkdir -p "$evidence/archive"
          tar -xf "$tar_file" -C "$evidence/archive"
          cp "$output/run_summary.json" "$evidence/run_summary.json"
          find "$output" -type f -printf '%p\t%s\n' | sort > "$evidence/output-files.tsv"

          python - <<'PY'
          import hashlib
          import json
          from collections import defaultdict
          from pathlib import Path

          evidence = Path('/tmp/pstd-tika-body-types')
          archive = evidence / 'archive'
          data = archive / 'data'

          def records(name):
              path = data / name
              return [
                  json.loads(line)
                  for line in path.read_text(encoding='utf-8').splitlines()
                  if line.strip()
              ]

          messages = records('messages.jsonl')
          bodies = records('bodies.jsonl')
          by_message = defaultdict(list)
          for body in bodies:
              by_message[body['message_key']].append(body)

          if len(messages) != 4:
              raise SystemExit(f'unexpected message count: {len(messages)}')
          if len(bodies) != 4:
              raise SystemExit(f'unexpected body record count: {len(bodies)}')

          expected_forms = {
              'msg_41a42378327281a0': [('text', 0, 'body_payload_property_absent; supported_body_properties=0')],
              'msg_5745cddf4a8063e4': [('text', 0, 'body_payload_property_absent; supported_body_properties=0')],
              'msg_58f39dbbca78135b': [('text', 37, 'extracted')],
              'msg_6e55e2f20573a339': [('text', 0, 'body_payload_property_absent; supported_body_properties=0')],
          }
          actual_forms = {
              message_key: sorted(
                  (body['body_type'], body['size_bytes'], body['status'])
                  for body in message_bodies
              )
              for message_key, message_bodies in by_message.items()
          }
          for message_key in expected_forms:
              actual_forms.setdefault(message_key, [])
          if actual_forms != expected_forms:
              raise SystemExit(f'unexpected independent body-form baseline: {actual_forms!r}')

          target = next(
              message
              for message in messages
              if message['message_key'] == 'msg_58f39dbbca78135b'
          )
          expected_body_status = (
              'body_payload_extracted; payloads=1; supported_body_properties=2; '
              'body_types=text'
          )
          if target.get('body_status') != expected_body_status:
              raise SystemExit(
                  f"unexpected target body status: {target.get('body_status')!r}"
              )
          if target.get('has_text_body') is not True:
              raise SystemExit('target plain body is not marked present')
          if target.get('has_html_body') is not False:
              raise SystemExit('unresolved PR_HTML was incorrectly marked as extracted HTML')

          invalid_html_path = archive / 'bodies/msg_58f39dbbca78135b.html'
          if invalid_html_path.exists():
              raise SystemExit(
                  f'unresolved PR_HTML produced a payload at {invalid_html_path}'
              )
          if any(
              body['message_key'] == 'msg_58f39dbbca78135b'
              and body['body_type'] == 'html'
              for body in bodies
          ):
              raise SystemExit('unresolved PR_HTML produced a body record')

          report = {
              'fixture': {
                  'path': 'tests/fixtures/upstream/tika-various-body-types.pst',
                  'size_bytes': 271360,
                  'sha256': '24c5e6bbb8bf26a817c977283e40e7b69d2661fec0845abbe177f97efcb05fb0',
              },
              'message_count': len(messages),
              'body_record_count': len(bodies),
              'known_unresolved_html': {
                  'message_key': target['message_key'],
                  'raw_reference_hex': '7f800000',
                  'classification': 'property_present_but_unusable_no_payload_emitted',
                  'body_status': target.get('body_status'),
                  'has_html_body': target.get('has_html_body'),
              },
              'messages': [],
          }

          for message in sorted(messages, key=lambda row: row['message_key']):
              forms = []
              for body in sorted(by_message[message['message_key']], key=lambda row: row['body_type']):
                  entry = {
                      'body_key': body['body_key'],
                      'body_type': body['body_type'],
                      'status': body['status'],
                      'archive_path': body['archive_path'],
                      'encoding': body.get('encoding'),
                      'size_bytes': body['size_bytes'],
                      'sha256': body['sha256'],
                      'payload_present': False,
                  }
                  payload = archive / body['archive_path']
                  if payload.is_file():
                      raw = payload.read_bytes()
                      actual_hash = hashlib.sha256(raw).hexdigest()
                      if len(raw) != body['size_bytes']:
                          raise SystemExit(
                              f"{body['body_key']} size mismatch: {len(raw)} != {body['size_bytes']}"
                          )
                      if actual_hash != body['sha256']:
                          raise SystemExit(
                              f"{body['body_key']} hash mismatch: {actual_hash} != {body['sha256']}"
                          )
                      entry['payload_present'] = True
                      entry['prefix_hex'] = raw[:32].hex()
                  elif body['status'] == 'extracted':
                      raise SystemExit(
                          f"{body['body_key']} is extracted but payload is absent at {body['archive_path']}"
                      )
                  forms.append(entry)

              report['messages'].append({
                  'message_key': message['message_key'],
                  'message_node_id': message.get('message_node_id'),
                  'item_type': message.get('item_type'),
                  'subject': message.get('subject'),
                  'folder_key': message.get('folder_key'),
                  'folder_path': message.get('folder_path'),
                  'metadata_status': message.get('metadata_status'),
                  'body_status': message.get('body_status'),
                  'has_text_body': message.get('has_text_body'),
                  'has_html_body': message.get('has_html_body'),
                  'body_forms': forms,
              })

          evidence.joinpath('body-form-report.json').write_text(
              json.dumps(report, indent=2, ensure_ascii=False) + '\n',
              encoding='utf-8',
          )
          evidence.joinpath('messages.jsonl').write_text(
              '\n'.join(json.dumps(row, ensure_ascii=False, sort_keys=True) for row in messages) + '\n',
              encoding='utf-8',
          )
          evidence.joinpath('bodies.jsonl').write_text(
              '\n'.join(json.dumps(row, ensure_ascii=False, sort_keys=True) for row in bodies) + '\n',
              encoding='utf-8',
          )
          PY
      - name: Upload body-form evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tika-body-types-evidence
          path: /tmp/pstd-tika-body-types
          if-no-files-found: error
