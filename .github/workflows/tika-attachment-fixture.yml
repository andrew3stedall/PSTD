                  'ordinal': 0,
              },
              {
                  'recipient_key': 'rcpt_7e197f67c89bfd58',
                  'message_key': 'msg_0ff529af59d373d5',
                  'recipient_type': 'to',
                  'display_name': "'lfcnassif@gmail.com'",
                  'address_type': 'native_email_address',
                  'smtp_address': None,
                  'raw_address': 'lfcnassif@gmail.com',
                  'resolution_status': 'raw_address_preserved',
                  'ordinal': 0,
              },
          ]
          if recipients != expected_recipients:
              raise SystemExit(f'unexpected recipients: {recipients!r}')
          if len(attachments) != 2:
              raise SystemExit(f'unexpected attachment record count: {len(attachments)}')

          attachment = attachments[0]
          expected = {
              'message_key': 'msg_c6163b9157944cc9',
              'filename_original': 'attachment.docx',
              'filename_safe': 'attachment.docx',
              'extension': 'docx',
              'size_bytes': 11862,
              'declared_size_bytes': 15503,
              'size_status': 'size_mismatch',
              'sha256': '0c87a742c970907d3b08c73e7834768abadd00fe4f4995a7dd98a206d4c494c0',
              'attachment_method': 1,
              'ordinal': 0,
              'archive_path': 'attachments/msg_c6163b9157944cc9/att_0695091e19397627_attachment.docx',
              'extraction_status': 'attachment_payload_extracted_unicode_xblock; data_nid=0x0000833f; data_bid=0x632; child_blocks=2; zip_signature=504b0304',
          }
          for name, value in expected.items():
              if attachment.get(name) != value:
                  raise SystemExit(
                      f'attachment {name} mismatch: {attachment.get(name)!r} != {value!r}'
                  )

          embedded_attachment = attachments[1]
          expected_embedded_attachment = {
              'message_key': 'msg_c6163b9157944cc9',
              'attachment_key': 'att_a9c94a13d70f1cb3',
              'filename_original': None,
