                  'message_key': 'msg_ce73d10db9eceadb',
                  'recipient_type': 'to',
                  'display_name': 'users@opennlp.apache.org',
                  'address_type': 'SMTP',
                  'smtp_address': 'users@opennlp.apache.org',
                  'raw_address': 'users@opennlp.apache.org',
                  'resolution_status': 'smtp_available',
                  'ordinal': 0,
