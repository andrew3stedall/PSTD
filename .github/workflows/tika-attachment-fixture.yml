name: Tika attachment fixture

on:
  pull_request:
  push:
    branches: [main]

jobs:
  attachment-payload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo test data_tree
      - run: cargo test attachment_property_context
      - run: cargo clippy --all-targets --all-features -- -D warnings -A clippy::too_many_arguments
      - run: cargo fmt --check
      - name: Extract Tika attachment evidence
        shell: bash
        run: |
          set -euo pipefail
          fixture="tests/fixtures/upstream/tika-testPST.pst"
          evidence="/tmp/pstd-tika-attachment"
          output="/tmp/pstd-tika-attachment-output"
          eml_dir="$evidence/eml"
          mkdir -p "$evidence" "$output" "$eml_dir"
          (cd tests/fixtures/upstream && sha256sum --check SHA256SUMS)

          set +e
          cargo run -- extract --input "$fixture" --output "$output" --overwrite \
            > "$evidence/extract.stdout" 2> "$evidence/extract.stderr"
          extract_status=$?
          cargo run --bin pstd-eml -- "$fixture" "$eml_dir" \
            > "$evidence/eml.stdout" 2> "$evidence/eml.stderr"
          eml_status=$?
          set -e
          printf '%s\n' "$extract_status" > "$evidence/extract-exit-code.txt"
          printf '%s\n' "$eml_status" > "$evidence/eml-exit-code.txt"
          if [[ "$extract_status" -ne 0 && "$extract_status" -ne 2 ]]; then
            echo "Unexpected extraction exit code: $extract_status" >&2
            exit 1
          fi

          tar_file=$(find "$output/archives" -type f -name '*.tar' | sort | head -n 1)
          mkdir -p "$evidence/archive"
          tar -xf "$tar_file" -C "$evidence/archive"
          cp "$output/run_summary.json" "$evidence/run_summary.json"
          find "$output" -type f -printf '%p\t%s\n' | sort > "$evidence/output-files.tsv"

          python - <<'PY'
          import hashlib
          import json
          import zipfile
          from email import policy
          from email.parser import BytesParser
          from pathlib import Path

          evidence = Path('/tmp/pstd-tika-attachment')
          archive = evidence / 'archive'
          data = archive / 'data'
          output = Path('/tmp/pstd-tika-attachment-output')

          def records(name):
              path = data / name
              return [
                  json.loads(line)
                  for line in path.read_text(encoding='utf-8').splitlines()
                  if line.strip()
              ]

          messages = records('messages.jsonl')
          bodies = records('bodies.jsonl')
          recipients = records('recipients.jsonl')
          attachments = records('attachments.jsonl')
          if len(messages) != 7:
              raise SystemExit(f'unexpected message count: {len(messages)}')
          if len(bodies) != 8:
              raise SystemExit(f'unexpected body record count: {len(bodies)}')
          expected_recipients = [
              {
                  'recipient_key': 'rcpt_379c07577f6a2435',
                  'message_key': 'msg_2a24cb244caffb52',
                  'recipient_type': 'to',
                  'display_name': 'users@opennlp.apache.org',
                  'address_type': 'SMTP',
                  'smtp_address': 'users@opennlp.apache.org',
                  'raw_address': 'users@opennlp.apache.org',
                  'resolution_status': 'smtp_available',
                  'ordinal': 0,
              },
              {
                  'recipient_key': 'rcpt_0f0aa7896608e4db',
                  'message_key': 'msg_d7325f9579306ba3',
                  'recipient_type': 'to',
                  'display_name': 'kottmann@gmail.com',
                  'address_type': 'SMTP',
                  'smtp_address': 'kottmann@gmail.com',
                  'raw_address': 'kottmann@gmail.com',
                  'resolution_status': 'smtp_available',
                  'ordinal': 0,
              },
              {
                  'recipient_key': 'rcpt_688870b4d701b905',
                  'message_key': 'msg_d7325f9579306ba3',
                  'recipient_type': 'to',
                  'display_name': 'users@opennlp.apache.org',
                  'address_type': 'SMTP',
                  'smtp_address': 'users@opennlp.apache.org',
                  'raw_address': 'users@opennlp.apache.org',
                  'resolution_status': 'smtp_available',
                  'ordinal': 1,
              },
              {
                  'recipient_key': 'rcpt_e6506de5e0a2e4cb',
                  'message_key': 'msg_ce73d10db9eceadb',
                  'recipient_type': 'to',
                  'display_name': 'users@opennlp.apache.org',
                  'address_type': 'SMTP',
                  'smtp_address': 'users@opennlp.apache.org',
                  'raw_address': 'users@opennlp.apache.org',
                  'resolution_status': 'smtp_available',
                  'ordinal': 0,
              },
              {
                  'recipient_key': 'rcpt_fafe37d564978a11',
                  'message_key': 'msg_33144a866cb58408',
                  'recipient_type': 'to',
                  'display_name': 'dev@tika.apache.org',
                  'address_type': 'SMTP',
                  'smtp_address': 'dev@tika.apache.org',
                  'raw_address': 'dev@tika.apache.org',
                  'resolution_status': 'smtp_available',
                  'ordinal': 0,
              },
              {
                  'recipient_key': 'rcpt_28fe22645637e0eb',
                  'message_key': 'msg_5e70ad45c1c42472',
                  'recipient_type': 'to',
                  'display_name': 'dev@tika.apache.org',
                  'address_type': 'SMTP',
                  'smtp_address': 'dev@tika.apache.org',
                  'raw_address': 'dev@tika.apache.org',
                  'resolution_status': 'smtp_available',
                  'ordinal': 0,
              },
              {
                  'recipient_key': 'rcpt_73867f2f12bdd1e2',
                  'message_key': 'msg_4bc9d7bd77cbe661',
                  'recipient_type': 'to',
                  'display_name': 'Hong-Thai Nguyen',
                  'address_type': 'native_email_address',
                  'smtp_address': None,
                  'raw_address': '/o=ExchangeLabs/ou=Exchange Administrative Group (FYDIBOHF23SPDLT)/cn=Recipients/cn=polyspot1.onmicrosoft.com-50609-Hong-Thai.Ng',
                  'resolution_status': 'raw_address_preserved',
                  'ordinal': 0,
              },
              {
                  'recipient_key': 'rcpt_68933279ead844e0',
                  'message_key': 'msg_c6163b9157944cc9',
                  'recipient_type': 'to',
                  'display_name': "'lfcnassif@gmail.com'",
                  'address_type': 'native_email_address',
                  'smtp_address': None,
                  'raw_address': 'lfcnassif@gmail.com',
                  'resolution_status': 'raw_address_preserved',
                  'ordinal': 0,
              },
          ]
          if recipients != expected_recipients:
              raise SystemExit(f'unexpected recipients: {recipients!r}')
          if len(attachments) != 1:
              raise SystemExit(f'unexpected attachment record count: {len(attachments)}')

          attachment = attachments[0]
          expected = {
              'message_key': 'msg_c6163b9157944cc9',
              'filename_original': 'attachment.docx',
              'filename_safe': 'attachment.docx',
              'extension': 'docx',
              'size_bytes': 11862,
              'declared_size_bytes': 15503,
              'size_status': 'size_mismatch',
              'sha256': '0c87a742c970907d3b08c73e7834768abadd00fe4f4995a7dd98a206d4c494c0',
              'attachment_method': 1,
              'ordinal': 0,
              'archive_path': 'attachments/msg_c6163b9157944cc9/att_0695091e19397627_attachment.docx',
              'extraction_status': 'attachment_payload_extracted_unicode_xblock; data_nid=0x0000833f; data_bid=0x632; child_blocks=2; zip_signature=504b0304',
          }
          for name, value in expected.items():
              if attachment.get(name) != value:
                  raise SystemExit(
                      f'attachment {name} mismatch: {attachment.get(name)!r} != {value!r}'
                  )

          payload_path = archive / attachment['archive_path']
          payload = payload_path.read_bytes()
          if len(payload) != 11862:
              raise SystemExit(f'unexpected attachment payload size: {len(payload)}')
          if payload[:4] != b'PK\x03\x04':
              raise SystemExit(f'unexpected attachment signature: {payload[:4].hex()}')
          if hashlib.sha256(payload).hexdigest() != attachment['sha256']:
              raise SystemExit('attachment payload checksum mismatch')
          with zipfile.ZipFile(payload_path) as document:
              failed_member = document.testzip()
              if failed_member is not None:
                  raise SystemExit(f'DOCX CRC failure: {failed_member}')
              document_xml = document.read('word/document.xml').decode('utf-8')
          if 'This is a docx attachment.' not in document_xml:
              raise SystemExit('expected DOCX text is absent')

          owner = next(
              message for message in messages
              if message['message_key'] == 'msg_c6163b9157944cc9'
          )
          if owner['has_attachments'] is not True or owner['attachment_count'] != 1:
              raise SystemExit(f'owner attachment state mismatch: {owner!r}')
          if owner['extraction_status'] != 'metadata_and_payload':
              raise SystemExit(f'owner extraction status mismatch: {owner["extraction_status"]!r}')
          if 'attachment_property_context_payloads_extracted' not in owner['attachment_status']:
              raise SystemExit(f'owner attachment status mismatch: {owner["attachment_status"]!r}')

          body_payloads = [path for path in (archive / 'bodies').rglob('*') if path.is_file()]
          attachment_payloads = [
              path for path in (archive / 'attachments').rglob('*') if path.is_file()
          ]
          eml_files = [path for path in (evidence / 'eml').rglob('*.eml') if path.is_file()]
          eml_status = int(evidence.joinpath('eml-exit-code.txt').read_text().strip())
          if eml_status != 0:
              raise SystemExit(f'unexpected EML exit code: {eml_status}')
          if len(eml_files) != 1:
              raise SystemExit(f'unexpected EML file count: {len(eml_files)}')
          eml_path = eml_files[0]
          if eml_path.name != 'msg_c6163b9157944cc9.eml':
              raise SystemExit(f'unexpected EML filename: {eml_path.name}')
          eml_bytes = eml_path.read_bytes()
          if len(eml_bytes) != 17035:
              raise SystemExit(f'unexpected EML size: {len(eml_bytes)}')
          if b'\n' in eml_bytes.replace(b'\r\n', b'') or b'\r' in eml_bytes.replace(b'\r\n', b''):
              raise SystemExit('EML contains non-CRLF line endings')
          parsed_eml = BytesParser(policy=policy.default).parsebytes(eml_bytes)
          if parsed_eml.get_content_type() != 'multipart/mixed':
              raise SystemExit(f'unexpected EML content type: {parsed_eml.get_content_type()}')
          if parsed_eml['Subject'] != 'FW: First email':
              raise SystemExit(f'unexpected EML subject: {parsed_eml["Subject"]!r}')
          if str(parsed_eml['To']) != '"\'lfcnassif@gmail.com\'" <lfcnassif@gmail.com>':
              raise SystemExit(f'unexpected EML recipient: {parsed_eml["To"]!r}')
          if parsed_eml['Date'].datetime.isoformat() != '2020-11-26T22:18:00+00:00':
              raise SystemExit(f'unexpected EML Date: {parsed_eml["Date"]!r}')
          if b'From: Luis Filipe da Cruz Nassif </o=PF/' not in eml_bytes:
              raise SystemExit('native Exchange sender address was not preserved')
          if b'Content-Type: text/html' in eml_bytes:
              raise SystemExit('unusable four-byte HTML payload must not be emitted')
          body = parsed_eml.get_body(preferencelist=('plain',))
          if body is None or body.get_content() != 'Forwarding mail…\r\n\r\n':
              raise SystemExit(f'unexpected EML plain body: {body!r}')
          eml_attachments = list(parsed_eml.iter_attachments())
          if len(eml_attachments) != 1:
              raise SystemExit(f'unexpected EML attachment count: {len(eml_attachments)}')
          eml_attachment = eml_attachments[0]
          if eml_attachment.get_filename() != 'attachment.docx':
              raise SystemExit(f'unexpected EML attachment filename: {eml_attachment.get_filename()!r}')
          if eml_attachment.get_content_type() != (
              'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
          ):
              raise SystemExit(
                  f'unexpected EML attachment content type: {eml_attachment.get_content_type()}'
              )
          if eml_attachment.get_payload(decode=True) != payload:
              raise SystemExit('EML attachment payload differs from extracted DOCX bytes')

          tar_file = next((output / 'archives').glob('*.tar'))
          metrics = {
              'messages': len(messages),
              'body_records': len(bodies),
              'recipient_records': len(recipients),
              'attachment_records': len(attachments),
              'body_payload_files': len(body_payloads),
              'body_payload_bytes': sum(path.stat().st_size for path in body_payloads),
              'attachment_payload_files': len(attachment_payloads),
              'attachment_payload_bytes': sum(path.stat().st_size for path in attachment_payloads),
              'eml_files': len(eml_files),
              'eml_bytes': sum(path.stat().st_size for path in eml_files),
              'messages_jsonl_bytes': (data / 'messages.jsonl').stat().st_size,
              'bodies_jsonl_bytes': (data / 'bodies.jsonl').stat().st_size,
              'recipients_jsonl_bytes': (data / 'recipients.jsonl').stat().st_size,
              'attachments_jsonl_bytes': (data / 'attachments.jsonl').stat().st_size,
              'tar_bytes': tar_file.stat().st_size,
              'output_total_bytes': sum(
                  path.stat().st_size for path in output.rglob('*') if path.is_file()
              ),
          }
          expected_metrics = {
              'messages': 7,
              'body_records': 8,
              'recipient_records': 8,
              'attachment_records': 1,
              'body_payload_files': 6,
              'body_payload_bytes': 252,
              'attachment_payload_files': 1,
              'attachment_payload_bytes': 11862,
              'eml_files': 1,
              'eml_bytes': 17035,
              'messages_jsonl_bytes': 21521,
              'bodies_jsonl_bytes': 2275,
              'recipients_jsonl_bytes': 2418,
              'attachments_jsonl_bytes': 643,
              'tar_bytes': 202752,
              'output_total_bytes': 241579,
          }
          if metrics != expected_metrics:
              raise SystemExit(f'fixture metrics mismatch: {metrics!r}')
          evidence.joinpath('metrics.json').write_text(
              json.dumps(metrics, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          evidence.joinpath('attachment.json').write_text(
              json.dumps(attachment, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          evidence.joinpath('owner-message.json').write_text(
              json.dumps(owner, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          evidence.joinpath('docx-sha256.txt').write_text(
              attachment['sha256'] + '\n',
              encoding='utf-8',
          )
          PY
      - name: Upload Tika attachment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tika-attachment-payload-evidence
          path: /tmp/pstd-tika-attachment
          if-no-files-found: error
