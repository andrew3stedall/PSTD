name: Tika attachment fixture

on:
  pull_request:
  push:
    branches: [main]

jobs:
  attachment-payload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo test data_tree
      - run: cargo test attachment_property_context
      - run: cargo clippy --all-targets --all-features -- -D warnings -A clippy::too_many_arguments
      - run: cargo fmt --check
      - name: Extract Tika attachment evidence
        shell: bash
        run: |
          set -euo pipefail
          fixture="tests/fixtures/upstream/tika-testPST.pst"
          evidence="/tmp/pstd-tika-attachment"
          output="/tmp/pstd-tika-attachment-output"
          eml_dir="$evidence/eml"
          mkdir -p "$evidence" "$output" "$eml_dir"
          (cd tests/fixtures/upstream && sha256sum --check SHA256SUMS)

          set +e
          cargo run -- extract --input "$fixture" --output "$output" --overwrite \
            > "$evidence/extract.stdout" 2> "$evidence/extract.stderr"
          extract_status=$?
          cargo run --bin pstd-eml -- "$fixture" "$eml_dir" \
            > "$evidence/eml.stdout" 2> "$evidence/eml.stderr"
          eml_status=$?
          set -e
          printf '%s\n' "$extract_status" > "$evidence/extract-exit-code.txt"
          printf '%s\n' "$eml_status" > "$evidence/eml-exit-code.txt"
          if [[ "$extract_status" -ne 0 && "$extract_status" -ne 2 ]]; then
            echo "Unexpected extraction exit code: $extract_status" >&2
            exit 1
          fi

          tar_file=$(find "$output/archives" -type f -name '*.tar' | sort | head -n 1)
          mkdir -p "$evidence/archive"
          tar -xf "$tar_file" -C "$evidence/archive"
          cp "$output/run_summary.json" "$evidence/run_summary.json"
          find "$output" -type f -printf '%p\t%s\n' | sort > "$evidence/output-files.tsv"

          python - <<'PY'
          import hashlib
          import json
          import zipfile
          from email import policy
          from email.parser import BytesParser
          from pathlib import Path

          evidence = Path('/tmp/pstd-tika-attachment')
          archive = evidence / 'archive'
          data = archive / 'data'
          output = Path('/tmp/pstd-tika-attachment-output')

          def records(name):
              path = data / name
              return [
                  json.loads(line)
                  for line in path.read_text(encoding='utf-8').splitlines()
                  if line.strip()
              ]

          messages = records('messages.jsonl')
          folders = records('folders.jsonl')
          bodies = records('bodies.jsonl')
          recipients = records('recipients.jsonl')
          attachments = records('attachments.jsonl')
          if len(messages) != 8:
              raise SystemExit(f'unexpected message count: {len(messages)}')
          folder_fields = (
              'folder_key',
              'parent_folder_key',
              'folder_node_id',
              'folder_name',
              'folder_path',
              'item_count_total',
              'child_folder_count',
          )
          actual_folders = [
              {name: folder.get(name) for name in folder_fields}
              for folder in folders
          ]
          expected_folders = [
              {
                  'folder_key': 'folder_0235fadc0c8f7958',
                  'parent_folder_key': None,
                  'folder_node_id': None,
                  'folder_name': 'root',
                  'folder_path': '/',
                  'item_count_total': None,
                  'child_folder_count': 7,
              },
              {
                  'folder_key': 'folder_65667efd8c5a5a02',
                  'parent_folder_key': 'folder_0235fadc0c8f7958',
                  'folder_node_id': 'node_122',
                  'folder_name': 'node_122',
                  'folder_path': '/node_122',
                  'item_count_total': 0,
                  'child_folder_count': None,
              },
              {
                  'folder_key': 'folder_f65c580d3cda4ace',
                  'parent_folder_key': 'folder_0235fadc0c8f7958',
                  'folder_node_id': 'node_2223',
                  'folder_name': 'SPAM Search Folder 2',
                  'folder_path': '/SPAM Search Folder 2',
                  'item_count_total': 0,
                  'child_folder_count': None,
              },
              {
                  'folder_key': 'folder_b6721eebbda60057',
                  'parent_folder_key': 'folder_0235fadc0c8f7958',
                  'folder_node_id': 'node_8022',
                  'folder_name': 'Début du fichier de données Outlook',
                  'folder_path': '/Début du fichier de données Outlook',
                  'item_count_total': 7,
                  'child_folder_count': None,
              },
              {
                  'folder_key': 'folder_5769a9840120442c',
                  'parent_folder_key': 'folder_0235fadc0c8f7958',
                  'folder_node_id': 'node_8042',
                  'folder_name': 'Racine (pour la recherche)',
                  'folder_path': '/Racine (pour la recherche)',
                  'item_count_total': 0,
                  'child_folder_count': None,
              },
              {
                  'folder_key': 'folder_e04c6c42560935fe',
                  'parent_folder_key': 'folder_0235fadc0c8f7958',
                  'folder_node_id': 'node_8062',
                  'folder_name': 'Éléments supprimés',
