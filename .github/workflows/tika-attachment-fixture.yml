              document_xml = document.read('word/document.xml').decode('utf-8')
          if 'This is a docx attachment.' not in document_xml:
              raise SystemExit('expected DOCX text is absent')

          owner = next(
              message for message in messages
              if message['message_key'] == 'msg_c6163b9157944cc9'
          )
