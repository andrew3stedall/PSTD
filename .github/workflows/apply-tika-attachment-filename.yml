name: Apply Tika attachment filename implementation

on:
  push:
    branches: [expose-docx-attachment-filename]
    paths:
      - '.github/workflows/apply-tika-attachment-filename.yml'
      - 'src/pst/attachment_property_context.rs'
      - 'src/engine/metadata.rs'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: expose-docx-attachment-filename
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Wire validated attachment metadata into extraction
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          mod_path = Path('src/pst/mod.rs')
          mod_text = mod_path.read_text(encoding='utf-8')
          if 'pub mod attachment_property_context;' not in mod_text:
              mod_text = mod_text.replace(
                  'pub mod attachment_table;\n',
                  'pub mod attachment_property_context;\npub mod attachment_table;\n',
                  1,
              )
              mod_path.write_text(mod_text, encoding='utf-8')

          path = Path('src/engine/metadata.rs')
          text = path.read_text(encoding='utf-8')
          import_old = 'use crate::pst::attachment_table::attachment_payloads_from_subnode_blocks;\n'
          import_new = (
              'use crate::pst::attachment_property_context::'
              'attachment_records_from_property_context_subnodes;\n'
              + import_old
          )
          if 'use crate::pst::attachment_property_context::' not in text:
              text = text.replace(import_old, import_new, 1)

          recipient_marker = (
              '                            if recipient_output.status == MESSAGE_RECIPIENT_OUTPUT_ATTACHED {\n'
              '                                recipients.extend(recipient_output.recipients);\n'
              '                            }\n'
          )
          occurrences = [
              index for index in range(len(text))
              if text.startswith(recipient_marker, index)
          ]
          if len(occurrences) < 2:
              raise SystemExit('active attachment recipient marker not found')
          insertion_at = occurrences[1] + len(recipient_marker)
          wiring = (
              '                            let (\n'
              '                                mut property_context_attachments,\n'
              '                                attachment_property_report,\n'
              '                            ) = attachment_records_from_property_context_subnodes(\n'
              '                                &message.message_key,\n'
              '                                &loaded_subnodes.payloads,\n'
              '                            );\n'
          )
          if 'let (\n                                mut property_context_attachments' not in text:
              text = text[:insertion_at] + wiring + text[insertion_at:]

          old_count = (
              '                            let attachment_record_count =\n'
              '                                loaded_attachments.len() + unavailable_attachment_records.len();\n'
          )
          new_count = (
              '                            let attachment_record_count = loaded_attachments.len()\n'
              '                                + unavailable_attachment_records.len()\n'
              '                                + property_context_attachments.len();\n'
          )
          text = text.replace(old_count, new_count, 1)

          text = text.replace(
              '                            if loaded_attachments.is_empty() {\n',
              '                            if loaded_attachments.is_empty()\n'
              '                                && property_context_attachments.is_empty()\n'
              '                            {\n',
              1,
          )

          old_else_status = (
              '                                message.attachment_status = format!(\n'
              '                                    "{}; {}; {}",\n'
              '                                    loaded_subnodes.report.status,\n'
              '                                    attachment_report.status,\n'
              '                                    triage_status\n'
              '                                );\n'
          )
          new_else_status = (
              '                                message.attachment_status = format!(\n'
              '                                    "{}; {}; {}; {}; property_contexts={}; filename_records={}; rejected_contexts={}",\n'
              '                                    loaded_subnodes.report.status,\n'
              '                                    attachment_report.status,\n'
              '                                    triage_status,\n'
              '                                    attachment_property_report.status,\n'
              '                                    attachment_property_report.property_context_count,\n'
              '                                    attachment_property_report.filename_record_count,\n'
              '                                    attachment_property_report.rejected_context_count,\n'
              '                                );\n'
          )
          text = text.replace(old_else_status, new_else_status, 1)

          drain_marker = (
              '                                message.extraction_status = "metadata_and_payload".to_string();\n'
              '                                for payload in loaded_attachments.drain(..) {\n'
          )
          drain_replacement = (
              '                                message.extraction_status = if loaded_attachments.is_empty() {\n'
              '                                    "metadata_body_and_attachment_metadata".to_string()\n'
              '                                } else {\n'
              '                                    "metadata_and_payload".to_string()\n'
              '                                };\n'
              '                                attachments.append(&mut property_context_attachments);\n'
              '                                for payload in loaded_attachments.drain(..) {\n'
          )
          text = text.replace(drain_marker, drain_replacement, 1)

          path.write_text(text, encoding='utf-8')
          PY
          cargo fmt --all
          cargo test attachment_property_context
      - name: Commit implementation
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'Implementation already applied.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/engine/metadata.rs src/pst/mod.rs src/pst/attachment_property_context.rs
          git commit -m 'Expose DOCX attachment filename from property context'
          git push origin HEAD:expose-docx-attachment-filename
