name: Bootstrap upstream PST fixtures

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: add-upstream-pst-fixtures
      - name: Download pinned upstream fixtures
        shell: bash
        run: |
          set -euo pipefail
          fixture_dir="tests/fixtures/upstream"
          mkdir -p "$fixture_dir"

          curl --fail --location --retry 3 --output "$fixture_dir/tika-testPST.pst" \
            "https://raw.githubusercontent.com/apache/tika/63e22d08ef249cc73a6d02da7bc199fc3623a607/tika-app/src/test/resources/test-data/testPST.pst"
          curl --fail --location --retry 3 --output "$fixture_dir/tika-various-body-types.pst" \
            "https://raw.githubusercontent.com/apache/tika/63e22d08ef249cc73a6d02da7bc199fc3623a607/tika-parsers/tika-parsers-standard/tika-parsers-standard-modules/tika-parser-microsoft-module/src/test/resources/test-documents/testPST_variousBodyTypes.pst"
          curl --fail --location --retry 3 --output "$fixture_dir/java-libpst-dist-list.pst" \
            "https://raw.githubusercontent.com/rjohnsondev/java-libpst/f158a64acf2a0e46ac3bd699bc7a5a8da6c40d26/src/test/resources/dist-list.pst"

          printf '%s  %s\n' \
            'f2a6b1d2cad00f574e3d1c1211c4b1c854d6526caea77213adc3da92b7813ae3' \
            "$fixture_dir/tika-testPST.pst" \
            '24c5e6bbb8bf26a817c977283e40e7b69d2661fec0845abbe177f97efcb05fb0' \
            "$fixture_dir/tika-various-body-types.pst" \
            > /tmp/known-sha256s
          sha256sum --check /tmp/known-sha256s

          for fixture in "$fixture_dir"/*.pst; do
            signature=$(od -An -tx1 -N4 "$fixture" | tr -d ' \n')
            test "$signature" = '2142444e'
          done

          (
            cd "$fixture_dir"
            sha256sum *.pst | sort > SHA256SUMS
            stat -c '%n\t%s' *.pst | sort > FILE-SIZES.tsv
          )
      - name: Commit verified fixtures
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/fixtures/upstream
          if git diff --cached --quiet; then
            echo 'Verified fixtures already match the pinned upstream bytes.'
            exit 0
          fi
          git commit -m 'Add verified upstream PST fixtures'
          git push origin HEAD:add-upstream-pst-fixtures
