name: Patch PR457 plain child

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    if: >-
      github.repository == 'andrew3stedall/PSTD' &&
      github.head_ref == 'agent/emit-child-plain-text-eml' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Apply exact patch
        run: python tools/patch_pr457_plain_child.py
      - name: Format and verify
        run: |
          cargo fmt --all
          cargo fmt --check
      - name: Focused EML tests
        run: cargo test --bin pstd-eml
      - name: All Rust tests
        run: cargo test --all-targets
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Commit intended production change
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/bin/pstd-eml.rs
          git diff --cached --check
          git commit -m "Gate plain-text EML emission to embedded messages"
          git push origin HEAD:${{ github.head_ref }}
