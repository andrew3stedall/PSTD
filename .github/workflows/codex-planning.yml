name: Codex Planning Council

on:
  workflow_dispatch:
    inputs:
      planning_request:
        description: "Planning request or PRD summary for Codex to decompose"
        required: true
        type: string
      source_issue_number:
        description: "Optional GitHub issue number containing source requirements"
        required: false
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: codex-planning-council
  cancel-in-progress: false

jobs:
  planning:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build planning input
        run: |
          mkdir -p .codex-runtime
          cat > .codex-runtime/planning-input.md <<'EOF'
          # Planning request

          ${{ github.event.inputs.planning_request }}

          # Optional source issue

          ${{ github.event.inputs.source_issue_number }}
          EOF

      - name: Run Codex planning council
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/planning-council.md
          output-file: codex-planning-output.md
          sandbox: read-only
          safety-strategy: drop-sudo

      - name: Upload planning output
        uses: actions/upload-artifact@v4
        with:
          name: codex-planning-output
          path: codex-planning-output.md
