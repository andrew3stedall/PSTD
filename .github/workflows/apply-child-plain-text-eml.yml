name: Apply child plain-text EML patch

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-patch:
    if: github.head_ref == 'agent/emit-child-plain-text-eml' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Apply exact incremental patch
        run: python .github/scripts/apply-child-plain-text-eml.py
      - name: Validate focused change
        run: |
          cargo fmt --check
          cargo test --bin pstd-eml
      - name: Commit tested implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/bin/pstd-eml.rs .github/workflows/tika-attachment-fixture.yml
          git commit -m 'Emit attachmentless plain-text EML'
          git push origin HEAD:${{ github.head_ref }}
