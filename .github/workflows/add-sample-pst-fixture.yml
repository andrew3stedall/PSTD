name: Add sample PST fixture

on:
  push:
    branches:
      - add-sample-pst-fixture
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-fixture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: add-sample-pst-fixture

      - name: Download sample PST
        run: |
          set -euo pipefail
          mkdir -p tests/fixtures/pst
          curl -L --fail --retry 3 -o tests/fixtures/pst/sample.pst \
            "https://raw.githubusercontent.com/aspose-email/Aspose.Email-for-Java/master/Examples/src/main/resources/outlook/sample.pst"
          test -s tests/fixtures/pst/sample.pst
          file tests/fixtures/pst/sample.pst

      - name: Commit fixture and remove helper workflow
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/add-sample-pst-fixture.yml
          git add tests/fixtures/pst/sample.pst .github/workflows/add-sample-pst-fixture.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Add sample PST fixture"
          git push origin HEAD:add-sample-pst-fixture
