name: Render Vertical 36 Tika workflow

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  render:
    if: >-
      github.repository == 'andrew3stedall/PSTD' &&
      github.head_ref == 'agent/vertical-36-method5-eml-payload' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Render exact workflow bytes
        run: |
          python tools/patch_vertical36_tika_workflow.py
          cp .github/workflows/tika-attachment-fixture.yml tools/rendered-vertical36-tika-workflow.yml
          git checkout -- .github/workflows/tika-attachment-fixture.yml
      - name: Commit rendered non-workflow blob
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tools/rendered-vertical36-tika-workflow.yml
          git diff --cached --check
          git commit -m "Render exact Vertical 36 Tika workflow"
          git push origin HEAD:${{ github.head_ref }}
      - name: Record Git object metadata
        run: |
          printf '%s\n' "$(git rev-parse HEAD^{tree})" > vertical36-base-tree-sha.txt
          printf '%s\n' "$(git hash-object tools/rendered-vertical36-tika-workflow.yml)" > vertical36-rendered-blob-sha.txt
      - name: Upload Git metadata
        uses: actions/upload-artifact@v4
        with:
          name: vertical36-rendered-git-metadata
          path: |
            vertical36-base-tree-sha.txt
            vertical36-rendered-blob-sha.txt
          if-no-files-found: error
