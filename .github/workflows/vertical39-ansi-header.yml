name: Apply Vertical 39 ANSI header baseline

on:
  workflow_dispatch:
  push:
    branches:
      - agent/vertical-39-ansi-header-baseline

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/vertical-39-ansi-header-baseline
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Apply exact ANSI header patch
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/pst/header.rs')
          text = path.read_text()

          replacements = [
              (
                  'use crate::pst::binary::{u16_le_at, u64_le_at};',
                  'use crate::pst::binary::{u16_le_at, u32_le_at, u64_le_at};',
              ),
              (
                  'pub const PST_HEADER_CRYPT_METHOD_OFFSET: usize = 513;\nconst PST_HEADER_READ_BYTES: usize = PST_HEADER_CRYPT_METHOD_OFFSET + 1;',
                  'pub const PST_HEADER_CRYPT_METHOD_OFFSET: usize = 513;\npub const PST_ANSI_HEADER_CRYPT_METHOD_OFFSET: usize = 461;\nconst PST_HEADER_READ_BYTES: usize = PST_HEADER_CRYPT_METHOD_OFFSET + 1;',
              ),
              (
                  'const LEGACY_NBT_ROOT_OFFSET_FIELD: usize = 48;\nconst LEGACY_BBT_ROOT_OFFSET_FIELD: usize = 56;',
                  'const LEGACY_NBT_ROOT_OFFSET_FIELD: usize = 48;\nconst LEGACY_BBT_ROOT_OFFSET_FIELD: usize = 56;\nconst ANSI_NBT_ROOT_OFFSET_FIELD: usize = 188;\nconst ANSI_BBT_ROOT_OFFSET_FIELD: usize = 196;',
              ),
              (
                  '''        let legacy_bbt_root_offset = read_optional_offset(buf, LEGACY_BBT_ROOT_OFFSET_FIELD)?;\n        let legacy_nbt_root_offset = read_optional_offset(buf, LEGACY_NBT_ROOT_OFFSET_FIELD)?;''',
                  '''        let (legacy_bbt_root_offset, legacy_nbt_root_offset) = match variant {\n            PstVariant::Ansi => (\n                read_optional_u32_offset(buf, ANSI_BBT_ROOT_OFFSET_FIELD)?,\n                read_optional_u32_offset(buf, ANSI_NBT_ROOT_OFFSET_FIELD)?,\n            ),\n            _ => (\n                read_optional_offset(buf, LEGACY_BBT_ROOT_OFFSET_FIELD)?,\n                read_optional_offset(buf, LEGACY_NBT_ROOT_OFFSET_FIELD)?,\n            ),\n        };''',
              ),
              (
                  '            crypt_method: buf.get(PST_HEADER_CRYPT_METHOD_OFFSET).copied(),',
                  '''            crypt_method: match variant {\n                PstVariant::Unicode => buf.get(PST_HEADER_CRYPT_METHOD_OFFSET).copied(),\n                PstVariant::Ansi => buf.get(PST_ANSI_HEADER_CRYPT_METHOD_OFFSET).copied(),\n                PstVariant::Unknown => None,\n            },''',
              ),
              (
                  '''    candidates.push(PstRootCandidateDiagnostic::from_offsets(\n        "legacy_header_fields",\n        file_size,\n        legacy_bbt_root_offset,\n        legacy_nbt_root_offset,\n    ));''',
                  '''    let mut legacy_candidate = PstRootCandidateDiagnostic::from_offsets(\n        if variant == PstVariant::Ansi {\n            "ansi_root_bref_offsets"\n        } else {\n            "legacy_header_fields"\n        },\n        file_size,\n        legacy_bbt_root_offset,\n        legacy_nbt_root_offset,\n    );\n    if variant == PstVariant::Ansi {\n        legacy_candidate.selectable_for_traversal = false;\n        legacy_candidate.condition =\n            "ansi_root_pages_detected_traversal_disabled".to_string();\n    }\n    candidates.push(legacy_candidate);''',
              ),
              (
                  '''fn read_optional_offset(buf: &[u8], start: usize) -> PstdResult<Option<u64>> {''',
                  '''fn read_optional_u32_offset(buf: &[u8], start: usize) -> PstdResult<Option<u64>> {\n    if buf.len() < start + 4 {\n        return Ok(None);\n    }\n    let value = u32_le_at(buf, start, 0)? as u64;\n    if value == 0 {\n        Ok(None)\n    } else {\n        Ok(Some(value))\n    }\n}\n\nfn read_optional_offset(buf: &[u8], start: usize) -> PstdResult<Option<u64>> {''',
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'exact replacement expected once, found {count}: {old[:80]!r}')
              text = text.replace(old, new, 1)

          tests = r'''

#[cfg(test)]
mod tests {
    use super::*;

    fn synthetic_ansi_header(version: u16) -> Vec<u8> {
        let mut header = vec![0u8; PST_HEADER_READ_BYTES];
        header[0..4].copy_from_slice(&PST_MAGIC);
        header[8..10].copy_from_slice(b"SM");
        header[10..12].copy_from_slice(&version.to_le_bytes());
        header[ANSI_NBT_ROOT_OFFSET_FIELD..ANSI_NBT_ROOT_OFFSET_FIELD + 4]
            .copy_from_slice(&0x0000_0400u32.to_le_bytes());
        header[ANSI_NBT_ROOT_OFFSET_FIELD + 4..ANSI_NBT_ROOT_OFFSET_FIELD + 8]
            .copy_from_slice(&0xfeed_beefu32.to_le_bytes());
        header[ANSI_BBT_ROOT_OFFSET_FIELD..ANSI_BBT_ROOT_OFFSET_FIELD + 4]
            .copy_from_slice(&0x0000_0800u32.to_le_bytes());
        header[ANSI_BBT_ROOT_OFFSET_FIELD + 4..ANSI_BBT_ROOT_OFFSET_FIELD + 8]
            .copy_from_slice(&0xdead_beefu32.to_le_bytes());
        header[PST_ANSI_HEADER_CRYPT_METHOD_OFFSET] = 1;
        header[PST_HEADER_CRYPT_METHOD_OFFSET] = 2;
        header
    }

    #[test]
    fn ansi_versions_decode_32_bit_roots_but_do_not_enable_traversal() {
        for version in [14, 15] {
            let header = synthetic_ansi_header(version);
            let parsed = PstHeader::parse_bytes(&header, 0x20_000).unwrap();

            assert_eq!(parsed.variant, PstVariant::Ansi);
            assert_eq!(
                parsed.summary.parser_status,
                "detected_ansi_header_unsupported_for_extraction"
            );
            assert_eq!(parsed.summary.magic_client.as_deref(), Some("SM"));
            assert_eq!(parsed.summary.crypt_method, Some(1));
            assert!(parsed.roots.bbt_root.is_none());
            assert!(parsed.roots.nbt_root.is_none());
            assert_eq!(parsed.summary.bbt_root_offset, None);
            assert_eq!(parsed.summary.nbt_root_offset, None);

            let candidate = &parsed.summary.root_diagnostics.candidates[0];
            assert_eq!(candidate.source, "ansi_root_bref_offsets");
            assert_eq!(candidate.nbt_root.offset, Some(0x400));
            assert_eq!(candidate.bbt_root.offset, Some(0x800));
            assert!(!candidate.selectable_for_traversal);
            assert_eq!(
                candidate.condition,
                "ansi_root_pages_detected_traversal_disabled"
            );
        }
    }

    #[test]
    fn ansi_root_offsets_ignore_adjacent_bytes() {
        let header = synthetic_ansi_header(14);
        let parsed = PstHeader::parse_bytes(&header, 0x20_000).unwrap();
        let candidate = &parsed.summary.root_diagnostics.candidates[0];

        assert_eq!(candidate.nbt_root.offset, Some(0x400));
        assert_eq!(candidate.bbt_root.offset, Some(0x800));
        assert_ne!(candidate.nbt_root.offset, Some(0xfeed_beef_0000_0400));
        assert_ne!(candidate.bbt_root.offset, Some(0xdead_beef_0000_0800));
    }
}
'''
          if '#[cfg(test)]\nmod tests {' in text:
              raise SystemExit('header.rs already contains a test module')
          text += tests
          path.write_text(text)
          PY
      - name: Format and validate focused change
        run: |
          cargo fmt --all
          cargo test --all
          cargo clippy --all-targets --all-features -- -D warnings
          cargo fmt --all -- --check
      - name: Commit implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pst/header.rs
          git commit -m "Decode ANSI header fields without enabling traversal"
          git push origin HEAD:agent/vertical-39-ansi-header-baseline
