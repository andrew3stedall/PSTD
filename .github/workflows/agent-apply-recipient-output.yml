name: Apply structured recipient output integration

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feature/emit-structured-message-recipients' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/emit-structured-message-recipients
          fetch-depth: 0
      - name: Apply focused production integration
        shell: python
        run: |
          from pathlib import Path

          path = Path('src/engine/metadata.rs')
          text = path.read_text()

          old_import = "use crate::pst::tc_extraction_reporting::finalize_table_probe_collection;\nuse crate::pst::tc_probe_collection::record_subnode_payload_probe;\nuse crate::pst::tc_run_reporting::TcRunProbeCollector;"
          new_import = "use crate::pst::tc_extraction_reporting::finalize_table_probe_collection;\nuse crate::pst::tc_message_recipient_output::{\n    build_message_recipient_output, MESSAGE_RECIPIENT_OUTPUT_ATTACHED,\n};\nuse crate::pst::tc_probe_collection::record_subnode_payload_probe;\nuse crate::pst::tc_reporting::TcSubnodeProbeReport;\nuse crate::pst::tc_run_reporting::TcRunProbeCollector;"
          if old_import not in text:
              raise SystemExit('metadata import anchor not found')
          text = text.replace(old_import, new_import, 1)

          old_recipients = "    let recipients: Vec<RecipientRecord> = Vec::new();"
          new_recipients = "    let mut recipients: Vec<RecipientRecord> = Vec::new();"
          if old_recipients not in text:
              raise SystemExit('recipient vector anchor not found')
          text = text.replace(old_recipients, new_recipients, 1)

          old_probe = """                            record_subnode_payload_probe(
                                &mut table_probe_collector,
                                reference,
                                &loaded_subnodes.payloads,
                            );"""
          new_probe = """                            let probe = record_subnode_payload_probe(
                                &mut table_probe_collector,
                                reference,
                                &loaded_subnodes.payloads,
                            );
                            append_message_recipient_output(
                                run_id,
                                &message.message_key,
                                &probe,
                                &mut recipients,
                                &mut issues,
                            );"""
          if text.count(old_probe) != 2:
              raise SystemExit(f'expected two probe anchors, found {text.count(old_probe)}')
          text = text.replace(old_probe, new_probe)

          helper_anchor = "\nfn discover_folder_hierarchy("
          helper = """

fn append_message_recipient_output(
    run_id: &str,
    message_key: &str,
    probe: &TcSubnodeProbeReport,
    recipients: &mut Vec<RecipientRecord>,
    issues: &mut Vec<StatusRecord>,
) {
    let output = build_message_recipient_output(message_key, probe);
    let status = output.status.clone();
    let candidate_count = output.candidate_count;
    let failure_reason = output
        .failure_reason
        .clone()
        .unwrap_or_else(|| "none".to_string());
    let recipient_count = output.recipients.len();

    if status == MESSAGE_RECIPIENT_OUTPUT_ATTACHED {
        recipients.extend(output.recipients);
    }

    issues.push(StatusRecord::info(
        run_id,
        "tc_message_recipient_output",
        format!(
            "Message recipient output for {message_key}: status={status}; candidates={candidate_count}; recipients={recipient_count}; failure={failure_reason}"
        ),
    ));
}
"""
          if helper_anchor not in text:
              raise SystemExit('helper insertion anchor not found')
          text = text.replace(helper_anchor, helper + helper_anchor, 1)
          path.write_text(text)

          doc = Path('docs/operations/vertical-22-emit-structured-message-recipients.md')
          doc.write_text('''# Vertical 22: Emit structured message recipients

## Objective

Connect the validated message-attributed Table Context recipient projection to `MetadataExtractionOutput.recipients` without parsing diagnostic text or decoding the table twice.

## Requirement revision

The preceding vertical completed a fail-closed selection-to-output operation. The next highest-value step is production integration, not another recipient abstraction. The extraction loop must retain the typed probe returned by `record_subnode_payload_probe`, build recipient output against the matching message key, and append records only when the exactly-one-table rule succeeds.

## Implementation

- capture the typed `TcSubnodeProbeReport` at both existing message subnode probe sites;
- call `build_message_recipient_output` with the current message key;
- append records only for `tc_message_recipient_output_attached`;
- emit bounded message-level status evidence with candidate and recipient counts;
- preserve empty output for unavailable, ambiguous, or invalid evidence;
- keep native `PidTagEmailAddress` values as native addresses rather than inferring SMTP from string shape.

## Expected public-fixture evidence

One extraction run should emit four structured recipient records associated with the extracted message:

| Ordinal | Role | Display name | Raw address | Address semantics |
|---:|---|---|---|---|
| 0 | To | Recipient 1 | `to1@domain.com` | native email address |
| 1 | To | Recipient 2 | `to2@domain.com` | native email address |
| 2 | Cc | Recipient 3 | `cc1@domain.com` | native email address |
| 3 | Cc | Recipient 4 | `cc2@domain.com` | native email address |

Existing message, body, attachment, and byte-count baselines must remain stable.

## Safety properties

- no diagnostic status string is parsed;
- no Table Context payload is decoded twice;
- zero or multiple validated recipient tables expose no records;
- conversion failure exposes no partial records;
- authoritative SMTP output is populated only from `PidTagSmtpAddress` evidence.

## Evidence required before merge

- Rust build, tests, Clippy, and formatting pass;
- Python CLI and Docker checks pass;
- public PST fixture emits exactly four recipient JSONL records for the matching message key;
- no existing extraction metric regresses;
- no unresolved review threads remain.

## Following vertical

Once structured recipients are fixture-confirmed, the next milestone should consume those records in message export, beginning with deterministic `To` and `Cc` header construction. If the repository does not yet have a complete EML writer boundary, first attach recipient records to the message export model rather than adding further Table Context diagnostics.
''')

          Path('.github/workflows/agent-apply-recipient-output.yml').unlink()
      - name: Commit implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Emit structured recipients from message probes"
          git push origin HEAD:feature/emit-structured-message-recipients
