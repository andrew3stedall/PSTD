name: Fix PR 469 fixture regression

on:
  push:
    branches:
      - agent/vertical-38-reject-raw-html

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/vertical-38-reject-raw-html
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Reject unresolved four-byte body references
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/pst/messages.rs')
          text = path.read_text()
          old = '''fn binary_property_bytes(properties: &PropertyContext, tag: u32) -> Option<Vec<u8>> {
              match properties.value(tag)?.decoded.as_ref() {
                  Some(MapiValue::Binary(bytes)) => Some(bytes.clone()),
                  _ => None,
              }
          }
          '''
          new = '''fn binary_property_bytes(properties: &PropertyContext, tag: u32) -> Option<Vec<u8>> {
              match properties.value(tag)?.decoded.as_ref() {
                  Some(MapiValue::Binary(bytes)) if bytes.len() != size_of::<u32>() => {
                      Some(bytes.clone())
                  }
                  _ => None,
              }
          }
          '''
          if old not in text:
              raise SystemExit('binary_property_bytes target not found')
          text = text.replace(old, new, 1)

          marker = '''    #[test]
              fn rejects_raw_only_binary_html_property() {
          '''
          insertion = '''    #[test]
              fn rejects_decoded_four_byte_binary_html_reference() {
                  let mut values = HashMap::new();
                  values.insert(
                      PR_HTML,
                      PropertyValue {
                          tag: PR_HTML,
                          name: "body_html".to_string(),
                          raw: vec![0x7f, 0x80, 0x00, 0x00],
                          decoded: Some(MapiValue::Binary(vec![0x7f, 0x80, 0x00, 0x00])),
                          status: "selected".to_string(),
                      },
                  );
                  let properties = PropertyContext::from_values(values);

                  let payloads = body_payloads_from_properties("msg_123", &properties);
                  let report = body_coverage_report(&properties, &payloads);

                  assert!(payloads.is_empty());
                  assert!(report.html_property_present);
                  assert_eq!(report.supported_body_property_count, 1);
                  assert_eq!(report.extracted_payload_count, 0);
                  assert_eq!(
                      report.status,
                      "body_payload_properties_present_but_unusable; supported_body_properties=1"
                  );
              }

          '''
          if marker not in text:
              raise SystemExit('test insertion marker not found')
          text = text.replace(marker, insertion + marker, 1)
          path.write_text(text)
          PY
          cargo fmt --all
          cargo test --all
          cargo clippy --all-targets --all-features -- -D warnings -A clippy::too_many_arguments
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pst/messages.rs
          git commit -m "Reject unresolved four-byte body references"
          git push origin HEAD:agent/vertical-38-reject-raw-html
