name: Vertical 37 metadata integration

on:
  push:
    branches:
      - agent/vertical-37-membership-transport-v2

permissions:
  contents: write

jobs:
  integrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/vertical-37-membership-transport-v2
          fetch-depth: 0

      - name: Apply narrow metadata integration
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/engine/metadata.rs')
          text = path.read_text()

          def replace_once(old: str, new: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected one replacement, found {count}: {old[:80]!r}')
              text = text.replace(old, new, 1)

          replace_once(
              'use crate::eml::materialize_embedded_message_payloads;\n',
              'use crate::eml::materialize_embedded_message_payloads;\nuse crate::engine::message_folder_ownership::resolve_folder_ownership;\n',
          )
          replace_once(
              'use crate::pst::message_metadata::{message_from_properties, status_row};\n',
              'use crate::pst::message_metadata::{message_from_properties, status_row};\nuse crate::pst::message_ownership::MessageOwnershipResolution;\n',
          )
          replace_once(
              '''    let message_membership_status = message_table_discovery.message_membership_status();\n\n    if !nbt.entries.is_empty() {\n''',
              '''    let message_membership_status = message_table_discovery.message_membership_status();
    let folder_path_by_key: HashMap<_, _> = folders
        .iter()
        .map(|folder| (folder.folder_key.clone(), folder.folder_path.clone()))
        .collect();
    let ownership_report = resolve_folder_ownership(
        &reader,
        &bbt,
        &nbt,
        &message_table_discovery,
        &folder_path_by_key,
        limits,
    );
    for diagnostic in &ownership_report.diagnostics {
        issues.push(StatusRecord::info(
            run_id,
            "vertical37_message_folder_ownership",
            diagnostic.clone(),
        ));
    }

    if !nbt.entries.is_empty() {
''',
          )
          replace_once(
              '''        for entry in message_table_discovery.message_candidates.iter().take(1000) {
            let message_key = ids::message_key(pst_id, &node_identity(entry));
            let candidate_status = classify_message_candidate(entry)
                .map(|candidate| {
                    format!(
                        "{}; {}",
                        candidate.membership_status, message_membership_status
                    )
                })
                .unwrap_or_else(|| message_membership_status.clone());
''',
              '''        for entry in message_table_discovery.message_candidates.iter().take(1000) {
            let message_key = ids::message_key(pst_id, &node_identity(entry));
            let (owner_folder_key, owner_folder_path, ownership_status) =
                match ownership_report.resolutions.get(&entry.node_id) {
                    Some(MessageOwnershipResolution::Resolved(owner)) => (
                        owner.folder_key.as_str(),
                        owner.folder_path.as_str(),
                        owner.status.clone(),
                    ),
                    Some(MessageOwnershipResolution::Unresolved { status })
                    | Some(MessageOwnershipResolution::Ambiguous { status }) => {
                        ("", "", status.clone())
                    }
                    None => ("", "", "message_table_membership_absent".to_string()),
                };
            let candidate_status = classify_message_candidate(entry)
                .map(|candidate| {
                    format!(
                        "{}; {}; {}",
                        candidate.membership_status, message_membership_status, ownership_status
                    )
                })
                .unwrap_or_else(|| format!("{}; {}", message_membership_status, ownership_status));
''',
          )
          replace_once(
              '''                        &root_folder.folder_key,
                        &root_folder.folder_path,
                        entry.node_id,
''',
              '''                        owner_folder_key,
                        owner_folder_path,
                        entry.node_id,
''',
          )
          replace_once(
              '''                        &root_folder.folder_key,
                        &root_folder.folder_path,
                        entry,
                        &candidate_status,
''',
              '''                        owner_folder_key,
                        owner_folder_path,
                        entry,
                        &candidate_status,
''',
          )

          path.write_text(text)
          PY

          cargo fmt --all
          cargo test message_folder_ownership --all-targets
          cargo test message_ownership --all-targets
          git diff --check

      - name: Commit integration
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/engine/metadata.rs
          git diff --cached --quiet && exit 0
          git commit -m "feat: apply authoritative message folder ownership"
          git push origin HEAD:agent/vertical-37-membership-transport-v2
