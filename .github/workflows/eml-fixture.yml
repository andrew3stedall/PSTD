name: Readable EML fixture

on:
  pull_request:
  push:
    branches: [main]

jobs:
  public-pst-eml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo test --all
      - run: cargo clippy --all-targets --all-features -- -D warnings -A clippy::too_many_arguments
      - run: cargo fmt --check
      - name: Find public PST fixture
        id: fixture
        shell: bash
        run: |
          fixture=$(find . -type f -iname '*.pst' | sort | head -n 1 || true)
          echo "fixture=$fixture" >> "$GITHUB_OUTPUT"
          if [[ -z "$fixture" ]]; then
            echo "No public PST fixture found" >&2
            exit 1
          fi
      - name: Emit readable EML
        shell: bash
        run: |
          set -euo pipefail
          fixture="${{ steps.fixture.outputs.fixture }}"
          evidence_dir="/tmp/pstd-public-pst-eml"
          eml_dir="$evidence_dir/eml"
          mkdir -p "$eml_dir"
          cargo run --bin pstd-eml -- "$fixture" "$eml_dir" | tee "$evidence_dir/eml-summary.txt"
          find "$eml_dir" -type f -name '*.eml' -print | sort > "$evidence_dir/eml-files.txt"
          test "$(wc -l < "$evidence_dir/eml-files.txt")" -eq 1
          eml_file=$(head -n 1 "$evidence_dir/eml-files.txt")
          stat -c '%s' "$eml_file" > "$evidence_dir/eml-size-bytes.txt"
          python - <<'PY'
          from pathlib import Path

          evidence = Path('/tmp/pstd-public-pst-eml')
          eml_path = Path(evidence.joinpath('eml-files.txt').read_text(encoding='utf-8').strip())
          raw = eml_path.read_bytes()
          if b'\r\n\r\n' not in raw:
              raise SystemExit('EML is missing the CRLF header/body separator')
          if b'\n' in raw.replace(b'\r\n', b''):
              raise SystemExit('EML contains bare LF line endings')
          text = raw.decode('utf-8')
          required = [
              'From: ',
              'To: Recipient 1 <to1@domain.com>, Recipient 2 <to2@domain.com>\r\n',
              'Cc: Recipient 3 <cc1@domain.com>, Recipient 4 <cc2@domain.com>\r\n',
              'Subject: ',
              'MIME-Version: 1.0\r\n',
              'Content-Type: text/plain; charset=utf-8\r\n',
          ]
          missing = [value for value in required if value not in text]
          if missing:
              raise SystemExit(f'EML missing required readable content: {missing!r}')
          headers, body = text.split('\r\n\r\n', 1)
          if not body.strip():
              raise SystemExit('EML plain-text body is empty')
          evidence.joinpath('message.eml').write_bytes(raw)
          evidence.joinpath('headers.txt').write_text(headers + '\n', encoding='utf-8')
          evidence.joinpath('body.txt').write_text(body, encoding='utf-8')
          PY
      - name: Upload readable EML evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-pst-readable-eml
          path: /tmp/pstd-public-pst-eml
          if-no-files-found: error
