name: Readable EML fixture

on:
  pull_request:
  push:
    branches: [main]

jobs:
  public-pst-eml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo test --all
      - run: cargo clippy --all-targets --all-features -- -D warnings -A clippy::too_many_arguments
      - run: cargo fmt --check
      - name: Find public PST fixture
        id: fixture
        shell: bash
        run: |
          fixture=$(find . -type f -iname '*.pst' | sort | head -n 1 || true)
          echo "fixture=$fixture" >> "$GITHUB_OUTPUT"
          if [[ -z "$fixture" ]]; then
            echo "No public PST fixture found" >&2
            exit 1
          fi
      - name: Emit readable multipart EML
        shell: bash
        run: |
          set -euo pipefail
          fixture="${{ steps.fixture.outputs.fixture }}"
          evidence_dir="/tmp/pstd-public-pst-eml"
          eml_dir="$evidence_dir/eml"
          mkdir -p "$eml_dir"
          cargo run --bin pstd-eml -- "$fixture" "$eml_dir" | tee "$evidence_dir/eml-summary.txt"
          find "$eml_dir" -type f -name '*.eml' -print | sort > "$evidence_dir/eml-files.txt"
          test "$(wc -l < "$evidence_dir/eml-files.txt")" -eq 1
          eml_file=$(head -n 1 "$evidence_dir/eml-files.txt")
          stat -c '%s' "$eml_file" > "$evidence_dir/eml-size-bytes.txt"
          python - <<'PY'
          from email import policy
          from email.parser import BytesParser
          from pathlib import Path

          evidence = Path('/tmp/pstd-public-pst-eml')
          eml_path = Path(evidence.joinpath('eml-files.txt').read_text(encoding='utf-8').strip())
          raw = eml_path.read_bytes()
          if b'\n' in raw.replace(b'\r\n', b''):
              raise SystemExit('EML contains bare LF line endings')
          message = BytesParser(policy=policy.default).parsebytes(raw)
          if message.get_content_type() != 'multipart/alternative':
              raise SystemExit(f'unexpected root content type: {message.get_content_type()}')
          parts = list(message.iter_parts())
          if [part.get_content_type() for part in parts] != ['text/plain', 'text/rtf']:
              raise SystemExit(f'unexpected alternative parts: {[part.get_content_type() for part in parts]!r}')
          plain = parts[0].get_content()
          rich = parts[1].get_content()
          if 'This is an evaluation copy of Aspose.Email for Java' not in plain:
              raise SystemExit('plain-text part is missing known fixture content')
          if not rich.startswith('{\\rtf'):
              raise SystemExit('RTF part is not a readable RTF document')
          for expected in ['This line is in bold.', 'This line is in blue color']:
              if expected not in rich:
                  raise SystemExit(f'RTF part is missing {expected!r}')
          required_headers = {
              'From': 'Sender Name <from@domain.com>',
              'To': 'Recipient 1 <to1@domain.com>, Recipient 2 <to2@domain.com>',
              'Cc': 'Recipient 3 <cc1@domain.com>, Recipient 4 <cc2@domain.com>',
              'Subject': 'New message created by Aspose.Email for Java(Aspose.Email Evaluation)',
              'Date': 'Wed, 19 Aug 2015 11:07:26 +0000',
          }
          for name, expected in required_headers.items():
              if str(message[name]) != expected:
                  raise SystemExit(f'{name} mismatch: {message[name]!r}')
          evidence.joinpath('message.eml').write_bytes(raw)
          evidence.joinpath('plain-body.txt').write_text(plain, encoding='utf-8')
          evidence.joinpath('rich-body.rtf').write_text(rich, encoding='utf-8')
          PY
      - name: Upload readable EML evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-pst-readable-eml
          path: /tmp/pstd-public-pst-eml
          if-no-files-found: error
