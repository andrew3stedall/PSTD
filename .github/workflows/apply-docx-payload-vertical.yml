name: Apply DOCX payload vertical

on:
  pull_request:
    paths:
      - '.github/workflows/apply-docx-payload-vertical.yml'
      - 'scripts/apply_docx_payload_vertical.py'
      - 'scripts/fix_docx_payload_patch.py'
      - 'scripts/refine_docx_payload_vertical_v2.py'
      - 'src/pst/data_tree.rs'
  push:
    branches: [emit-docx-attachment-payload]
    paths:
      - '.github/workflows/apply-docx-payload-vertical.yml'
      - 'scripts/apply_docx_payload_vertical.py'
      - 'scripts/fix_docx_payload_patch.py'
      - 'scripts/refine_docx_payload_vertical_v2.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: emit-docx-attachment-payload
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Apply bounded source edits
        id: patch
        continue-on-error: true
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/docx-patch
          status=0
          if ! grep -q 'attachment_payloads_from_property_context_subnodes' src/pst/attachment_property_context.rs; then
            python scripts/fix_docx_payload_patch.py >> /tmp/docx-patch/patch.log 2>&1 || status=$?
            if [[ "$status" -eq 0 ]]; then
              python scripts/apply_docx_payload_vertical.py >> /tmp/docx-patch/patch.log 2>&1 || status=$?
            fi
          fi
          if [[ "$status" -eq 0 ]] && ! grep -q 'metadata_size_differs_from_xblock_total' src/pst/data_tree.rs; then
            python scripts/refine_docx_payload_vertical_v2.py >> /tmp/docx-patch/patch.log 2>&1 || status=$?
          fi
          printf '%s\n' "$status" > /tmp/docx-patch/status.txt
          cat /tmp/docx-patch/patch.log || true
          exit "$status"
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docx-patch-diagnostics
          path: /tmp/docx-patch
          if-no-files-found: error
      - name: Require patch success
        run: test "$(cat /tmp/docx-patch/status.txt)" = '0'
      - name: Format and verify source
        run: |
          set -euo pipefail
          cargo fmt --all
          cargo test data_tree
          cargo test attachment_property_context
          cargo clippy --all-targets --all-features -- -D warnings -A clippy::too_many_arguments
      - name: Commit source changes
        run: |
          set -euo pipefail
          git checkout -- scripts/apply_docx_payload_vertical.py scripts/refine_docx_payload_vertical_v2.py
          if git diff --quiet; then
            echo 'Source changes already applied.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/engine/metadata.rs src/pst/attachment_property_context.rs src/pst/data_tree.rs src/pst/mod.rs
          git commit -m 'Refine DOCX payload from XBLOCK evidence'
          git push origin HEAD:emit-docx-attachment-payload
