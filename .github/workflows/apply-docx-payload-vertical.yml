name: Apply DOCX payload vertical

on:
  pull_request:
    paths:
      - '.github/workflows/apply-docx-payload-vertical.yml'
      - 'scripts/apply_docx_payload_vertical.py'
      - 'src/pst/data_tree.rs'
  push:
    branches: [emit-docx-attachment-payload]
    paths:
      - '.github/workflows/apply-docx-payload-vertical.yml'
      - 'scripts/apply_docx_payload_vertical.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: emit-docx-attachment-payload
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Apply bounded source edits
        shell: bash
        run: |
          set -euo pipefail
          if grep -q 'attachment_payloads_from_property_context_subnodes' src/pst/attachment_property_context.rs; then
            echo 'Source changes already applied.'
            exit 0
          fi
          sed -i '244s/replace_once/replace_nth/' scripts/apply_docx_payload_vertical.py
          sed -i '248i\    1,' scripts/apply_docx_payload_vertical.py
          python scripts/apply_docx_payload_vertical.py
      - name: Format and verify source
        run: |
          set -euo pipefail
          cargo fmt --all
          cargo test data_tree
          cargo test attachment_property_context
          cargo clippy --all-targets --all-features -- -D warnings -A clippy::too_many_arguments
      - name: Commit source changes
        run: |
          set -euo pipefail
          git checkout -- scripts/apply_docx_payload_vertical.py
          if git diff --quiet; then
            echo 'Source changes already applied.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/engine/metadata.rs src/pst/attachment_property_context.rs src/pst/data_tree.rs src/pst/mod.rs
          git commit -m 'Emit validated DOCX attachment payload'
          git push origin HEAD:emit-docx-attachment-payload
