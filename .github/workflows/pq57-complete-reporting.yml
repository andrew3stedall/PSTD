name: PQ57 Complete Reporting

on:
  push:
    branches:
      - feature/pq57-expose-row-bitmap-masks

permissions:
  contents: write

jobs:
  complete-reporting:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/pq57-expose-row-bitmap-masks
          fetch-depth: 0
      - name: Patch reporting and tests
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('src/pst/tc_reporting.rs')
          s = p.read_text()
          s = s.replace(
              '    pub bitmap_unset_counts: Vec<usize>,\n    pub bitmap_status: String,',
              '    pub bitmap_unset_counts: Vec<usize>,\n    pub bitmap_masks: Vec<String>,\n    pub bitmap_status: String,'
          )
          s = s.replace(
              '        let bitmap_unset_counts = self\n            .bitmap_unset_counts\n            .iter()\n            .map(usize::to_string)\n            .collect::<Vec<_>>()\n            .join(":");\n        format!(',
              '        let bitmap_unset_counts = self\n            .bitmap_unset_counts\n            .iter()\n            .map(usize::to_string)\n            .collect::<Vec<_>>()\n            .join(":");\n        let bitmap_masks = self.bitmap_masks.join(":");\n        format!('
          )
          s = s.replace(
              'bitmap_set_counts={},bitmap_unset_counts={},bitmap_status={}',
              'bitmap_set_counts={},bitmap_unset_counts={},bitmap_masks={},bitmap_status={}'
          )
          s = s.replace(
              '            bitmap_unset_counts,\n            self.bitmap_status.replace',
              '            bitmap_unset_counts,\n            bitmap_masks,\n            self.bitmap_status.replace'
          )
          s = s.replace(
              '                        bitmap_unset_counts: subnode_rows\n                            .as_ref()\n                            .map_or_else(Vec::new, |rows| rows.bitmap_unset_counts.clone()),\n                        bitmap_status:',
              '                        bitmap_unset_counts: subnode_rows\n                            .as_ref()\n                            .map_or_else(Vec::new, |rows| rows.bitmap_unset_counts.clone()),\n                        bitmap_masks: subnode_rows\n                            .as_ref()\n                            .map_or_else(Vec::new, |rows| rows.bitmap_masks.clone()),\n                        bitmap_status:'
          )
          s = s.replace(
              '                    bitmap_unset_counts: Vec::new(),\n                    bitmap_status:',
              '                    bitmap_unset_counts: Vec::new(),\n                    bitmap_masks: Vec::new(),\n                    bitmap_status:'
          )
          marker = '    #[test]\n    fn ignores_non_table_payloads()'
          test = '''    #[test]\n    fn publishes_exact_bitmap_masks_in_diagnostic_status() {\n        let diagnostic = TcHeapDiagnostic {\n            block_id: 0x74,\n            payload_byte_len: 208,\n            resolved: true,\n            column_count: 14,\n            row_reference_count: 4,\n            row_references_in_bounds: 4,\n            row_references_out_of_bounds: 0,\n            rows_require_subnode_resolution: true,\n            rows_nid: 0x809f,\n            subnode_row_match_count: 1,\n            resolved_row_payload_count: 1,\n            row_data_byte_len: 208,\n            row_reference_values: vec![0, 1, 2, 3],\n            row_spans: vec![1, 1, 1, 205],\n            inferred_row_width: 52,\n            tcinfo_data_region_boundaries: [48, 48, 50, 52],\n            max_column_extent: 50,\n            bitmap_byte_len: 2,\n            bitmap_end: 52,\n            bitmap_rows_analyzed: 4,\n            bitmap_set_counts: vec![7; 4],\n            bitmap_unset_counts: vec![7; 4],\n            bitmap_masks: vec!["10101010101010".to_string(); 4],\n            bitmap_status: "tc_row_bitmap_masks_validated".to_string(),\n            row_layout_extents_valid: true,\n            row_layout_status: "tc_row_layout_extents_validated_52".to_string(),\n            status: "tc_subnode_rows_ordinal_index_validated_52".to_string(),\n            error: None,\n        };\n\n        let status = diagnostic.status_fragment();\n        assert!(status.contains(\n            "bitmap_masks=10101010101010:10101010101010:10101010101010:10101010101010"\n        ));\n    }\n\n'''
          s = s.replace(marker, test + marker)
          p.write_text(s)

          d = Path('docs/operations/pq57-row-bitmap-mask-evidence.md')
          text = d.read_text()
          text += '\n## Implementation completion\n\nThe exact masks are carried through `TcHeapDiagnostic` and rendered as `bitmap_masks` in the bounded public-fixture diagnostic. A reporting regression test prevents future loss of this evidence.\n'
          d.write_text(text)
          PY
      - name: Validate
        run: |
          cargo fmt --check
          cargo test tc_subnode_rows
          cargo test tc_reporting
          cargo clippy --all-targets --all-features -- -D warnings
      - name: Commit permanent implementation
        run: |
          rm .github/workflows/pq57-complete-reporting.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/pst/tc_reporting.rs docs/operations/pq57-row-bitmap-mask-evidence.md .github/workflows/pq57-complete-reporting.yml
          git commit -m "feat(pq57): publish row bitmap masks"
          git push origin HEAD:feature/pq57-expose-row-bitmap-masks
