name: PQ57 implementation

on:
  push:
    branches:
      - feature/pq57-expose-row-bitmap-masks
  workflow_dispatch:

permissions:
  contents: write

jobs:
  implement:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/pq57-expose-row-bitmap-masks
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Apply PQ57 implementation
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/pst/tc_subnode_rows.rs')
          text = path.read_text()
          text = text.replace(
              '    pub bitmap_unset_counts: Vec<usize>,\n    pub bitmap_status: String,',
              '    pub bitmap_unset_counts: Vec<usize>,\n    pub bitmap_masks: Vec<String>,\n    pub bitmap_status: String,'
          )
          text = text.replace(
              '    let (bitmap_set_counts, bitmap_unset_counts, bitmap_status) = if resolved_payload_count == 1 {',
              '    let (bitmap_set_counts, bitmap_unset_counts, bitmap_masks, bitmap_status) =\n        if resolved_payload_count == 1 {'
          )
          text = text.replace(
              '            Vec::new(),\n            Vec::new(),\n            "tc_row_bitmap_payload_unavailable".to_string(),',
              '            Vec::new(),\n            Vec::new(),\n            Vec::new(),\n            "tc_row_bitmap_payload_unavailable".to_string(),'
          )
          text = text.replace(
              '        bitmap_unset_counts,\n        bitmap_status,',
              '        bitmap_unset_counts,\n        bitmap_masks,\n        bitmap_status,'
          )
          text = text.replace(
              ') -> (Vec<usize>, Vec<usize>, String) {',
              ') -> (Vec<usize>, Vec<usize>, Vec<String>, String) {'
          )
          text = text.replace(
              '            Vec::new(),\n            Vec::new(),\n            "tc_row_bitmap_layout_invalid".to_string(),',
              '            Vec::new(),\n            Vec::new(),\n            Vec::new(),\n            "tc_row_bitmap_layout_invalid".to_string(),'
          )
          text = text.replace(
              '            Vec::new(),\n            Vec::new(),\n            "tc_row_bitmap_capacity_insufficient".to_string(),',
              '            Vec::new(),\n            Vec::new(),\n            Vec::new(),\n            "tc_row_bitmap_capacity_insufficient".to_string(),'
          )
          text = text.replace(
              '            Vec::new(),\n            Vec::new(),\n            "tc_row_bitmap_row_mode_unavailable".to_string(),',
              '            Vec::new(),\n            Vec::new(),\n            Vec::new(),\n            "tc_row_bitmap_row_mode_unavailable".to_string(),'
          )
          text = text.replace(
              '    let mut unset_counts = Vec::with_capacity(row_offsets.len());\n    for row_offset in row_offsets {',
              '    let mut unset_counts = Vec::with_capacity(row_offsets.len());\n    let mut masks = Vec::with_capacity(row_offsets.len());\n    for row_offset in row_offsets {'
          )
          text = text.replace(
              '                Vec::new(),\n                Vec::new(),\n                "tc_row_bitmap_bytes_out_of_bounds".to_string(),',
              '                Vec::new(),\n                Vec::new(),\n                Vec::new(),\n                "tc_row_bitmap_bytes_out_of_bounds".to_string(),'
          )
          text = text.replace(
              '        set_counts.push(set);\n        unset_counts.push(column_count - set);',
              '        let mask = (0..column_count)\n            .map(|bit| {\n                if bitmap[bit / 8] & (1 << (bit % 8)) != 0 {\n                    \'1\'\n                } else {\n                    \'0\'\n                }\n            })\n            .collect::<String>();\n        set_counts.push(set);\n        unset_counts.push(column_count - set);\n        masks.push(mask);'
          )
          text = text.replace(
              '        set_counts,\n        unset_counts,\n        "tc_row_bitmap_counts_validated".to_string(),',
              '        set_counts,\n        unset_counts,\n        masks,\n        "tc_row_bitmap_masks_validated".to_string(),'
          )
          text = text.replace(
              '        assert_eq!(report.bitmap_unset_counts, vec![14, 14, 14, 14]);\n        assert_eq!(report.bitmap_status, "tc_row_bitmap_counts_validated");',
              '        assert_eq!(report.bitmap_unset_counts, vec![14, 14, 14, 14]);\n        assert_eq!(report.bitmap_masks, vec!["00000000000000"; 4]);\n        assert_eq!(report.bitmap_status, "tc_row_bitmap_masks_validated");'
          )
          path.write_text(text)

          path = Path('src/pst/tc_reporting.rs')
          text = path.read_text()
          text = text.replace(
              '    pub bitmap_unset_counts: Vec<usize>,\n    pub bitmap_status: String,',
              '    pub bitmap_unset_counts: Vec<usize>,\n    pub bitmap_masks: Vec<String>,\n    pub bitmap_status: String,'
          )
          text = text.replace(
              '        let bitmap_unset_counts = self\n            .bitmap_unset_counts\n            .iter()\n            .map(usize::to_string)\n            .collect::<Vec<_>>()\n            .join(":");',
              '        let bitmap_unset_counts = self\n            .bitmap_unset_counts\n            .iter()\n            .map(usize::to_string)\n            .collect::<Vec<_>>()\n            .join(":");\n        let bitmap_masks = self.bitmap_masks.join(":");'
          )
          text = text.replace(
              'bitmap_rows={},bitmap_set_counts={},bitmap_unset_counts={},bitmap_status={}',
              'bitmap_rows={},bitmap_set_counts={},bitmap_unset_counts={},bitmap_masks={},bitmap_status={}'
          )
          text = text.replace(
              '            bitmap_unset_counts,\n            self.bitmap_status.replace',
              '            bitmap_unset_counts,\n            bitmap_masks,\n            self.bitmap_status.replace'
          )
          text = text.replace(
              '                        bitmap_unset_counts: subnode_rows\n                            .as_ref()\n                            .map_or_else(Vec::new, |rows| rows.bitmap_unset_counts.clone()),\n                        bitmap_status:',
              '                        bitmap_unset_counts: subnode_rows\n                            .as_ref()\n                            .map_or_else(Vec::new, |rows| rows.bitmap_unset_counts.clone()),\n                        bitmap_masks: subnode_rows\n                            .as_ref()\n                            .map_or_else(Vec::new, |rows| rows.bitmap_masks.clone()),\n                        bitmap_status:'
          )
          text = text.replace(
              '                    bitmap_unset_counts: Vec::new(),\n                    bitmap_status:',
              '                    bitmap_unset_counts: Vec::new(),\n                    bitmap_masks: Vec::new(),\n                    bitmap_status:'
          )
          path.write_text(text)

          Path('docs/operations/pq57-row-bitmap-mask-evidence.md').write_text('''# PQ57 — exact bounded row bitmap masks

## Evidence from PQ56

CI run 442 passed the complete workflow. The public fixture resolved four 52-byte rows and reported `bitmap_set_counts=7:7:7:7`, `bitmap_unset_counts=7:7:7:7`, and `bitmap_status=tc_row_bitmap_counts_validated`. Extraction remained at 11 folders, one message, two body payloads, zero attachments, one tar shard, and 29,806 output bytes.

## Revised requirement

Equal counts do not establish bit ordering or column association. PQ57 therefore preserves the exact first 14 bits from each validated two-byte row bitmap as an index-ordered mask. Position zero corresponds only to TCINFO bitmap index zero; it is not yet described as property presence.

The implementation must:

1. reuse only the already validated row mode, width, and bitmap range;
2. emit exactly one 14-character binary mask per analyzed row;
3. exclude the two padding bits from the mask;
4. retain the set and unset counts as cross-checks;
5. reject unavailable, undersized, or out-of-bounds bitmap layouts;
6. avoid reading column-value bytes or assigning property semantics.

## Expected public-fixture evidence

The fixture should report four masks, each containing exactly seven `1` bits and seven `0` bits, with `bitmap_status=tc_row_bitmap_masks_validated`. Extraction totals should remain unchanged.

## PQ58 decision boundary

If masks are stable, PQ58 should pair each mask position with the corresponding TCINFO column descriptor and report property tag, type, bitmap index, and raw set/unset state. It must still avoid decoding column values. If masks are inconsistent with the retained counts, stop and correct the bitmap ordering or range before further interpretation.
''')
          PY
      - name: Format and test
        run: |
          cargo fmt --all
          cargo test tc_subnode_rows
          cargo test tc_reporting
          cargo clippy --all-targets --all-features -- -D warnings
      - name: Commit permanent implementation and remove workflow
        run: |
          rm .github/workflows/pq57-implement.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/pst/tc_subnode_rows.rs src/pst/tc_reporting.rs docs/operations/pq57-row-bitmap-mask-evidence.md .github/workflows/pq57-implement.yml
          git commit -m "feat(pq57): expose exact bounded row bitmap masks"
          git push origin HEAD:feature/pq57-expose-row-bitmap-masks
