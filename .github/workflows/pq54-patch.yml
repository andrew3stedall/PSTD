name: PQ54 branch patch

on:
  push:
    branches:
      - feature/pq54-validate-tcinfo-row-extents

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/pq54-validate-tcinfo-row-extents
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Apply PQ54 implementation
        shell: python
        run: |
          from pathlib import Path

          heap = Path('src/pst/tc_heap.rs')
          text = heap.read_text()
          text = text.replace(
              '    pub property_tags: Vec<u32>,\n    pub row_index_hid: u32,',
              '    pub property_tags: Vec<u32>,\n    pub data_region_boundaries: [u16; 4],\n    pub max_column_extent: usize,\n    pub bitmap_byte_len: usize,\n    pub bitmap_end: usize,\n    pub row_index_hid: u32,'
          )
          text = text.replace(
              '    let tcinfo = TcInfo::parse(root, base_offset)?;\n\n    let row_index_result',
              '    let tcinfo = TcInfo::parse(root, base_offset)?;\n    let data_region_boundaries = tcinfo.data_region_boundaries;\n    let max_column_extent = tcinfo\n        .columns\n        .iter()\n        .map(|column| column.data_offset as usize + column.data_size as usize)\n        .max()\n        .unwrap_or(0);\n    let bitmap_byte_len = tcinfo.columns.len().div_ceil(8);\n    let bitmap_end = data_region_boundaries[3] as usize + bitmap_byte_len;\n\n    let row_index_result'
          )
          text = text.replace(
              '        property_tags: tcinfo\n            .columns\n            .iter()\n            .map(|column| column.property_tag)\n            .collect(),\n        row_index_hid:',
              '        property_tags: tcinfo\n            .columns\n            .iter()\n            .map(|column| column.property_tag)\n            .collect(),\n        data_region_boundaries,\n        max_column_extent,\n        bitmap_byte_len,\n        bitmap_end,\n        row_index_hid:'
          )
          text = text.replace(
              '        assert_eq!(report.property_tags, vec![0x001a0037, 0x001f3001]);\n        assert_eq!(report.row_index_hid, 0x60);',
              '        assert_eq!(report.property_tags, vec![0x001a0037, 0x001f3001]);\n        assert_eq!(report.data_region_boundaries, [4, 8, 10, 12]);\n        assert_eq!(report.max_column_extent, 8);\n        assert_eq!(report.bitmap_byte_len, 1);\n        assert_eq!(report.bitmap_end, 13);\n        assert_eq!(report.row_index_hid, 0x60);'
          )
          heap.write_text(text)

          reporting = Path('src/pst/tc_reporting.rs')
          text = reporting.read_text()
          text = text.replace(
              '    pub row_spans: Vec<usize>,\n    pub status: String,',
              '    pub row_spans: Vec<usize>,\n    pub inferred_row_width: usize,\n    pub tcinfo_data_region_boundaries: [u16; 4],\n    pub max_column_extent: usize,\n    pub bitmap_byte_len: usize,\n    pub bitmap_end: usize,\n    pub row_layout_extents_valid: bool,\n    pub row_layout_status: String,\n    pub status: String,'
          )
          text = text.replace(
              '"bid=0x{:x},bytes={},resolved={},columns={},row_refs={},in_bounds={},out_of_bounds={},subnode_rows={},rows_nid=0x{:x},row_matches={},row_payloads={},row_bytes={},row_reference_values={},row_spans={},status={},error={}",',
              '"bid=0x{:x},bytes={},resolved={},columns={},row_refs={},in_bounds={},out_of_bounds={},subnode_rows={},rows_nid=0x{:x},row_matches={},row_payloads={},row_bytes={},row_reference_values={},row_spans={},row_width={},tcinfo_regions={}:{}:{}:{},max_column_extent={},bitmap_bytes={},bitmap_end={},row_layout_valid={},row_layout_status={},status={},error={}",'
          )
          text = text.replace(
              '            row_reference_values,\n            row_spans,\n            self.status.replace(\';\', ","),',
              '            row_reference_values,\n            row_spans,\n            self.inferred_row_width,\n            self.tcinfo_data_region_boundaries[0],\n            self.tcinfo_data_region_boundaries[1],\n            self.tcinfo_data_region_boundaries[2],\n            self.tcinfo_data_region_boundaries[3],\n            self.max_column_extent,\n            self.bitmap_byte_len,\n            self.bitmap_end,\n            usize::from(self.row_layout_extents_valid),\n            self.row_layout_status.replace(\';\', ","),\n            self.status.replace(\';\', ","),'
          )
          text = text.replace(
              '                    TcHeapDiagnostic {\n                        block_id:',
              '                    let inferred_row_width = subnode_rows\n                        .as_ref()\n                        .map_or(0, |rows| rows.inferred_row_width);\n                    let (row_layout_status, row_layout_extents_valid) = validate_row_layout_extents(\n                        inferred_row_width,\n                        report.data_region_boundaries,\n                        report.max_column_extent,\n                        report.bitmap_end,\n                    );\n                    TcHeapDiagnostic {\n                        block_id:'
          )
          text = text.replace(
              '                        row_spans: subnode_rows\n                            .as_ref()\n                            .map_or_else(Vec::new, |rows| rows.row_spans.clone()),\n                        status:',
              '                        row_spans: subnode_rows\n                            .as_ref()\n                            .map_or_else(Vec::new, |rows| rows.row_spans.clone()),\n                        inferred_row_width,\n                        tcinfo_data_region_boundaries: report.data_region_boundaries,\n                        max_column_extent: report.max_column_extent,\n                        bitmap_byte_len: report.bitmap_byte_len,\n                        bitmap_end: report.bitmap_end,\n                        row_layout_extents_valid,\n                        row_layout_status,\n                        status:'
          )
          text = text.replace(
              '                    row_spans: Vec::new(),\n                    status: "tc_heap_resolution_failed".to_string(),',
              '                    row_spans: Vec::new(),\n                    inferred_row_width: 0,\n                    tcinfo_data_region_boundaries: [0; 4],\n                    max_column_extent: 0,\n                    bitmap_byte_len: 0,\n                    bitmap_end: 0,\n                    row_layout_extents_valid: false,\n                    row_layout_status: "tc_row_layout_width_unavailable".to_string(),\n                    status: "tc_heap_resolution_failed".to_string(),'
          )
          marker = '\n#[cfg(test)]\nmod tests {'
          helper = '''\nfn validate_row_layout_extents(\n    row_width: usize,\n    data_region_boundaries: [u16; 4],\n    max_column_extent: usize,\n    bitmap_end: usize,\n) -> (String, bool) {\n    if row_width == 0 {\n        return ("tc_row_layout_width_unavailable".to_string(), false);\n    }\n    let final_region_boundary = data_region_boundaries[3] as usize;\n    let valid = final_region_boundary <= row_width\n        && max_column_extent <= row_width\n        && bitmap_end <= row_width;\n    let status = if valid {\n        format!("tc_row_layout_extents_validated_{row_width}")\n    } else {\n        format!("tc_row_layout_extents_out_of_bounds_{row_width}")\n    };\n    (status, valid)\n}\n'''
          text = text.replace(marker, helper + marker)
          text = text.replace(
              '    use super::{report_subnode_table_heaps, report_table_heaps};',
              '    use super::{report_subnode_table_heaps, report_table_heaps, validate_row_layout_extents};'
          )
          insert = '''\n    #[test]\n    fn validates_and_rejects_tcinfo_extents_against_row_width() {\n        let (status, valid) = validate_row_layout_extents(52, [4, 8, 10, 12], 48, 14);\n        assert!(valid);\n        assert_eq!(status, "tc_row_layout_extents_validated_52");\n\n        let (status, valid) = validate_row_layout_extents(52, [4, 8, 10, 54], 48, 56);\n        assert!(!valid);\n        assert_eq!(status, "tc_row_layout_extents_out_of_bounds_52");\n    }\n'''
          text = text.replace('\n    #[test]\n    fn ignores_non_table_payloads()', insert + '\n    #[test]\n    fn ignores_non_table_payloads()')
          reporting.write_text(text)

          doc = Path('docs/operations/pq54-tcinfo-row-extent-validation.md')
          doc.write_text('''# PQ54 — validate TCINFO row extents\n\n## Evidence from PQ53\n\nGitHub Actions run #434 passed the full CI matrix. The public PST fixture reported `tc_subnode_rows_ordinal_index_validated_52` for four ordinal row references over a 208-byte payload. Extraction totals remained stable at 11 folders, one extracted message, two body payloads, zero attachments, one tar shard, and 29,806 output bytes.\n\n## Revised requirement\n\nPQ54 validates structural bounds before reading any row bytes:\n\n1. Preserve TCINFO data-region boundaries in the heap resolution report.\n2. Calculate the maximum `data_offset + data_size` across all column descriptors.\n3. Calculate presence-bitmap length as `ceil(column_count / 8)` and its end offset from the final TCINFO boundary.\n4. Compare the final region boundary, maximum column extent, and bitmap end with the proven row width.\n5. Publish a separate row-layout status without replacing the row-index interpretation status.\n6. Decode no bitmap bits, columns, or property values.\n\n## Expected fixture evidence\n\nThe fixture should retain the 52-byte ordinal-row status and additionally report either `tc_row_layout_extents_validated_52` or an exact out-of-bounds result with the boundaries and extents visible. Existing extraction totals must remain unchanged.\n\n## Safety boundary\n\nA successful bounds check establishes only that structural regions fit inside each row. It does not establish property-type decoding, nullability, variable-value indirection, or semantic correctness.\n\n## Proposed PQ55\n\nIf all extents fit, decode only the presence bitmap and report per-row present/absent counts without reading property values. If any extent overflows, inspect the exact TCINFO boundary interpretation before accessing row bytes.\n''')

          workflow = Path('.github/workflows/pq54-patch.yml')
          workflow.unlink()
      - name: Format and test
        run: |
          cargo fmt --all
          cargo test tc_heap
          cargo test tc_reporting
      - name: Commit implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/pst/tc_heap.rs src/pst/tc_reporting.rs docs/operations/pq54-tcinfo-row-extent-validation.md .github/workflows/pq54-patch.yml
          git commit -m "feat(pq54): validate TCINFO row extents"
          git push origin HEAD:feature/pq54-validate-tcinfo-row-extents
