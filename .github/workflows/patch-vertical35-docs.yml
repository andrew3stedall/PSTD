name: Patch Vertical 35 docs

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    if: >-
      github.repository == 'andrew3stedall/PSTD' &&
      github.head_ref == 'agent/document-vertical-35' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply exact documentation patch
        run: python tools/patch_vertical35_docs.py
      - name: Validate documentation delta
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          grep -Fq 'Vertical 35 / PR #457' README.md
          grep -Fq '2 / 17,488' docs/operations/public-pst-progress-log.md
          grep -Fq 'message/rfc822' docs/product/project-status.md
          grep -Fq 'vertical-35-emit-tika-child-eml.md' docs/README.md
          if grep -Fq 'It currently emits zero recipient records' docs/operations/upstream-pst-fixture-corpus.md; then
            echo 'stale Tika recipient statement remains' >&2
            exit 1
          fi
      - name: Commit intended documentation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md docs
          git diff --cached --check
          git commit -m 'Reconcile documentation through Vertical 35'
          git push origin HEAD:${{ github.head_ref }}
