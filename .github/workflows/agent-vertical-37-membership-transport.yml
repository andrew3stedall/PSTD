                .unwrap_or_else(|| format!("{}; {}", message_membership_status, ownership_status));
            match load_node_property_context(&reader, &bbt, entry, limits) {
''',
          )

          replace_once(
              'src/engine/metadata.rs',
              '''                    let mut message = message_from_properties(
                        run_id,
                        pst_id,
