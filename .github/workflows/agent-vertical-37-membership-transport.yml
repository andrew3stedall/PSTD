use crate::pst::message_table_membership::load_message_table_membership;
''',
          )

          replace_once(
              'src/engine/metadata.rs',
              '''    let message_table_discovery =
        discover_message_tables(&nbt, &folder_discovery.folder_key_by_node_identity);
    let message_membership_status = message_table_discovery.message_membership_status();
''',
              '''    let message_table_discovery =
        discover_message_tables(&nbt, &folder_discovery.folder_key_by_node_identity);
    let message_membership_status = message_table_discovery.message_membership_status();
    let folder_path_by_key: HashMap<_, _> = folders
        .iter()
        .map(|folder| (folder.folder_key.clone(), folder.folder_path.clone()))
        .collect();
    let message_candidates: Vec<_> = message_table_discovery
        .message_candidates
        .iter()
        .filter_map(|entry| message_node_type(entry.node_id).map(|kind| (entry.node_id, kind)))
        .collect();
    let mut membership_evidence = Vec::new();
    for table in &message_table_discovery.table_candidates {
        let Some(folder_key) = table.linked_folder_key.as_ref() else {
            continue;
        };
        let Some(folder_path) = folder_path_by_key.get(folder_key) else {
            continue;
        };
        let Some(table_entry) = nbt.entries.iter().find(|entry| entry.node_id == table.node_id) else {
            continue;
        };
        match load_message_table_membership(&reader, &bbt, table_entry, table.table_type, limits) {
            Ok(membership) => {
                issues.push(StatusRecord::info(
                    run_id,
                    "vertical37_message_table_membership",
                    format!("{}: {}", table.node_identity, membership.status),
                ));
                for row_node_id in membership.member_node_ids {
                    let matches: Vec<_> = message_candidates
                        .iter()
                        .filter(|(candidate_id, _)| candidate_id.0 == row_node_id.0)
                        .collect();
                    if matches.len() != 1 {
                        issues.push(StatusRecord::info(
                            run_id,
                            "vertical37_message_table_row_unmatched",
                            format!(
                                "{} row node_{:x} matched {} message candidates",
                                table.node_identity,
                                row_node_id.0,
                                matches.len()
                            ),
                        ));
                        continue;
                    }
                    let (message_node_id, message_node_type) = *matches[0];
                    membership_evidence.push(MessageMembershipEvidence {
                        message_node_id,
                        message_node_type,
                        table_node_type: table.table_type,
                        folder_key: folder_key.clone(),
                        folder_path: folder_path.clone(),
                    });
                }
            }
            Err(reason) => issues.push(StatusRecord::info(
                run_id,
                "vertical37_message_table_membership_unavailable",
                format!("{}: {reason}", table.node_identity),
            )),
        }
    }
    let message_ownership = resolve_message_ownership(&message_candidates, &membership_evidence);
''',
          )

          replace_once(
              'src/engine/metadata.rs',
              '''        for entry in message_table_discovery.message_candidates.iter().take(1000) {
