          cargo fmt --all
          cargo test message_ownership --all --quiet
          cargo test message_table --all --quiet
          cargo test message_table_membership --all --quiet
          git diff --check

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
