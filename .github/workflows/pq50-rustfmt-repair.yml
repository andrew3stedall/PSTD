name: PQ50 rustfmt repair

on:
  push:
    branches:
      - feature/pq50-resolve-subnode-row-storage

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/pq50-resolve-subnode-row-storage
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply formatter and remove temporary workflow
        run: |
          cargo fmt
          git rm .github/workflows/pq50-rustfmt-repair.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pst/tc_reporting.rs src/pst/tc_subnode_rows.rs
          if git diff --cached --quiet; then
            echo "No formatting changes were required" >&2
            exit 1
          fi
          git commit -m "style: apply PQ50 rustfmt output"
          git push origin HEAD:feature/pq50-resolve-subnode-row-storage
