name: Apply PQ48 engine integration

on:
  push:
    branches:
      - feature/pq48-wire-table-probe-engine

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/pq48-wire-table-probe-engine
          fetch-depth: 0
      - name: Apply bounded engine integration
        shell: python
        run: |
          from pathlib import Path

          path = Path('src/engine/metadata.rs')
          text = path.read_text()

          text = text.replace(
              'use crate::pst::subnodes::{\n    load_recursive_subnode_blocks, subnode_decode_plans, subnode_references_from_index,\n    SubnodeReference,\n};\n',
              'use crate::pst::subnodes::{\n    load_recursive_subnode_blocks, subnode_decode_plans, subnode_references_from_index,\n    SubnodeReference,\n};\nuse crate::pst::tc_extraction_reporting::finalize_table_probe_collection;\nuse crate::pst::tc_probe_collection::record_subnode_payload_probe;\nuse crate::pst::tc_run_reporting::TcRunProbeCollector;\n'
          )

          text = text.replace(
              '    let mut pq14_message_subnode_unsupported_layouts = 0usize;\n\n    let subnode_report',
              '    let mut pq14_message_subnode_unsupported_layouts = 0usize;\n    let mut table_probe_collector = TcRunProbeCollector::new();\n\n    let subnode_report'
          )

          needle = '                            let loaded_subnodes =\n                                load_recursive_subnode_blocks(&reader, &bbt, reference, 1, limits);\n'
          replacement = needle + '                            record_subnode_payload_probe(\n                                &mut table_probe_collector,\n                                reference,\n                                &loaded_subnodes.payloads,\n                            );\n'
          if text.count(needle) != 2:
              raise SystemExit(f'expected two recursive load sites, found {text.count(needle)}')
          text = text.replace(needle, replacement)

          text = text.replace(
              '    let pq6_status = format!(\n',
              '    let table_probe_summary =\n        finalize_table_probe_collection(run_id, table_probe_collector);\n    if let Some(issue) = table_probe_summary.issue.clone() {\n        issues.push(issue);\n    }\n    let table_probe_status = table_probe_summary.progress_status();\n\n    let pq6_status = format!(\n'
          )

          old = '        "{}; bbt_status={}; nbt_status={}; pq4_status={}; pq4_folder_candidates={}; pq4_folder_property_loaded={}; pq4_folder_property_unavailable={}; pq5_status={}; pq5_message_candidates={}; pq5_table_candidates={}; pq5_linked_tables={}; pq5_unlinked_tables={}; pq6_status={}; pq14_status={}; folders_discovered={}; m4_status=recipient_threading_available; m5_status=body_attachment_outputs_available; m10_status=payload_wiring_available; m11_status=extraction_path_integration; m12_status=attachment_subnode_integration; m14_status=recursive_subnode_layout_exploration; m15_status=compatibility_triage_available; m16_status=fixture_backed_decoder_expansion; m17_status=decoder_backlog_reporting; m18_status=decoder_backlog_review_workflow; m19_status=focused_candidate_selection; m23_status=attachment_metadata_fidelity; body_payloads={}; attachment_payloads={}; attachment_records={}; subnode_references={}; subnode_decode_plans={}; subnode_decode_attempts={}; subnode_decoded_blocks={}; subnode_child_references={}; subnode_recursive_child_decodes={}; subnode_unsupported_layouts={}; attachment_table_parse_errors={}; fixture_backed_decoder_hits={}; compatibility_triage_records={}; compatibility_follow_ups={}; decoder_backlog_items={}; decoder_issue_candidates={}; decoder_candidate_selection={}; selected_decoder_candidates={}; decoder_backlog_review_status={}",\n'
          new = '        "{}; bbt_status={}; nbt_status={}; pq4_status={}; pq4_folder_candidates={}; pq4_folder_property_loaded={}; pq4_folder_property_unavailable={}; pq5_status={}; pq5_message_candidates={}; pq5_table_candidates={}; pq5_linked_tables={}; pq5_unlinked_tables={}; pq6_status={}; pq14_status={}; pq48_table_probe_status={}; folders_discovered={}; m4_status=recipient_threading_available; m5_status=body_attachment_outputs_available; m10_status=payload_wiring_available; m11_status=extraction_path_integration; m12_status=attachment_subnode_integration; m14_status=recursive_subnode_layout_exploration; m15_status=compatibility_triage_available; m16_status=fixture_backed_decoder_expansion; m17_status=decoder_backlog_reporting; m18_status=decoder_backlog_review_workflow; m19_status=focused_candidate_selection; m23_status=attachment_metadata_fidelity; body_payloads={}; attachment_payloads={}; attachment_records={}; subnode_references={}; subnode_decode_plans={}; subnode_decode_attempts={}; subnode_decoded_blocks={}; subnode_child_references={}; subnode_recursive_child_decodes={}; subnode_unsupported_layouts={}; attachment_table_parse_errors={}; fixture_backed_decoder_hits={}; compatibility_triage_records={}; compatibility_follow_ups={}; decoder_backlog_items={}; decoder_issue_candidates={}; decoder_candidate_selection={}; selected_decoder_candidates={}; decoder_backlog_review_status={}",\n'
          if old not in text:
              raise SystemExit('status format contract not found')
          text = text.replace(old, new)
          text = text.replace(
              '        pq14_status,\n        folders_discovered,\n',
              '        pq14_status,\n        table_probe_status,\n        folders_discovered,\n'
          )

          path.write_text(text)

          Path('docs/operations/pq48-table-probe-engine-integration.md').write_text('''# PQ48 — table-probe engine integration\n\n## Decision\n\nPQ48 wires the existing PQ45–PQ47 reporting path into both successful recursive subnode loads in metadata extraction. No additional abstraction is introduced.\n\n## Changes\n\n- Instantiate one `TcRunProbeCollector` per extraction.\n- Record decoded payloads from the message-level and attachment-level recursive subnode paths.\n- Finalize once after message processing.\n- Add the bounded attributed issue only when a table heap is observed.\n- Append the aggregate status under `pq48_table_probe_status`.\n\n## Before versus after\n\n| Measure | Before PQ48 | After PQ48 |\n|---|---:|---:|\n| Engine call sites recording table probes | 0 of 2 | 2 of 2 |\n| Run-level table counters in extraction status | No | Yes |\n| Attributed table evidence in issues | Helper only | Emitted when observed |\n| Extracted messages, bodies, attachments, EMLs | Existing baseline | Expected unchanged |\n| Diagnostic fragments | Capped at 16 | Capped at 16 |\n\n## Evidence required from CI/public fixture\n\nCapture folders, messages, bodies, attachment payloads/records, output bytes, recursive decoded blocks, detected/resolved/failed table heaps, row references and attributed node/BID diagnostics. Compare these values directly with the last green public fixture.\n\n## Risks and next decision\n\nA zero table-heap count would prove the current recursive paths do not reach the expected table context in the public fixture. In that case PQ49 should investigate reachability and fixture selection rather than adding row materialisation. A positive resolved count with in-bounds row references would justify bounded row-width and column-boundary validation.\n''')

          workflow = Path('.github/workflows/pq48-apply.yml')
          workflow.unlink()
      - name: Format
        run: cargo fmt
      - name: Commit integration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/engine/metadata.rs docs/operations/pq48-table-probe-engine-integration.md .github/workflows/pq48-apply.yml
          git commit -m "PQ48: wire table probe reporting into metadata extraction"
          git push origin HEAD:feature/pq48-wire-table-probe-engine
